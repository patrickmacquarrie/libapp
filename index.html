<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Through the Wall | Love Is Blind prediction pool</title>
<meta name="description" content="Through the Wall is an unofficial social prediction pool for friends playing current and past Love Is Blind seasons together.">
<meta property="og:title" content="Through the Wall | Love Is Blind prediction pool">
<meta property="og:description" content="A social prediction pool for friends playing Love Is Blind seasons together.">
<meta name="theme-color" content="#431127">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2064%2064'%3E%3Cpath%20fill='%23ed0c72'%20d='M30%2056S8%2042%208%2024C8%2012%2020%207%2030%2017v39Z'/%3E%3Cpath%20fill='%237b2ee5'%20d='M34%2056V17C44%207%2056%2012%2056%2024c0%2018-22%2032-22%2032Z'/%3E%3Cpath%20fill='%23fff'%20d='M30%2012h4v44h-4z'/%3E%3Cpath%20fill='%237b2ee5'%20d='m32%205%202%205%205%202-5%202-2%205-2-5-5-2%205-2Z'/%3E%3Cpath%20fill='%23f2c85f'%20d='m10%2035%201.5%204L16%2041l-4.5%202L10%2047l-1.5-4L4%2041l4.5-2Z'/%3E%3Cpath%20fill='%23f2c85f'%20d='m54%2034%201.2%203.2L59%2039l-3.8%201.8L54%2044l-1.2-3.2L49%2039l3.8-1.8Z'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script>try{document.documentElement.dataset.theme=localStorage.getItem('prediction-pool-theme')||'light';}catch(e){document.documentElement.dataset.theme='light';}</script>
<style>
:root{
  --ink:#351323; --wine:#431127; --wine-deep:#290817; --rose:#ed0c72;
  --gold:#7b2ee5; --gold-soft:#c8a9ff; --blush:#ffd0e3; --blush-soft:#fce7ef;
  --cream:#f8f3ef; --card:#fffaf7; --line:#efd7df; --miss:#9b5b6b;
  --muted:#806b70; --soft-text:#9a8589; --surface:#fff; --surface-soft:#fff5f7;
}
:root[data-theme="dark"]{
  color-scheme:dark;
  --ink:#f8e9ee; --wine:#f3dbe4; --wine-deep:#fff4f7; --rose:#e78cab;
  --gold:#f2c85f; --gold-soft:#f7df96; --blush:#71334c; --blush-soft:#3a1b29;
  --cream:#170a11; --card:#25131c; --line:#5b2d41; --miss:#c898a7;
  --muted:#c6a8b3; --soft-text:#a98794; --surface:#211019; --surface-soft:#301722;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
button:focus-visible,input:focus-visible,select:focus-visible{outline:3px solid var(--gold-soft);outline-offset:2px}
body{
  background:
    radial-gradient(1100px 560px at 85% -8%, #fce2eb 0%, transparent 60%),
    radial-gradient(900px 520px at -10% 8%, #f7e9e2 0%, transparent 55%),
    var(--cream);
  color:var(--ink);
  font-family:Inter,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  -webkit-font-smoothing:antialiased;
}
.app{max-width:680px;margin:0 auto;padding:18px 16px 90px}
.hdr{text-align:center;padding:10px 0 0;position:relative}
.brand-logo{display:block;width:min(100%,500px);height:auto;margin:0 auto -2px}
.eyebrow{letter-spacing:.35em;font-size:11px;font-weight:600;color:var(--rose);text-transform:uppercase}
.hdr h1{font-family:'Playfair Display',Georgia,serif;font-size:34px;line-height:1.1;margin:8px 0 6px;color:var(--wine)}
.seasonpill{display:inline-block;font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--wine);background:linear-gradient(135deg,var(--blush-soft),#f5d7e4);padding:4px 14px;border-radius:999px}
.stepper{display:flex;justify-content:center;gap:4px;align-items:center;margin:16px 0 4px;flex-wrap:wrap}
.step{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#c0a2ab;padding:6px 11px;border-radius:999px;transition:all .2s}
.step.done{color:var(--wine)}
.step.cur{background:var(--wine);color:#fff;box-shadow:0 4px 14px rgba(110,31,59,.35)}
.heartsep{color:var(--gold);font-size:10px}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px;margin:14px 0;box-shadow:0 8px 24px rgba(110,31,59,.05)}
.card h2{font-family:'Playfair Display',Georgia,serif;color:var(--wine);font-size:23px;margin:0 0 4px}
.card h3{font-family:'Playfair Display',Georgia,serif;color:var(--wine);font-size:18px;margin:0 0 8px}
.lede{color:var(--muted);font-size:14px;line-height:1.55;margin:4px 0 0}
.btn-primary{display:block;width:100%;padding:15px 18px;margin-top:14px;border:none;border-radius:14px;color:#fff;font-weight:700;font-size:16px;font-family:Inter,sans-serif;cursor:pointer;background:linear-gradient(135deg,#d90068,#ed0c72 55%,#f4378f);box-shadow:0 10px 26px rgba(220,0,99,.24);transition:filter .15s,transform .1s}
.btn-primary:hover{filter:brightness(1.06)}
.btn-primary:active{transform:translateY(1px)}
.btn-primary:disabled{opacity:.4;cursor:default;box-shadow:none}
.btn-secondary{display:block;width:100%;padding:13px 18px;margin-top:10px;border:1.5px solid var(--wine);border-radius:14px;color:var(--wine);font-weight:700;font-size:15px;font-family:Inter,sans-serif;cursor:pointer;background:none}
.btn-secondary:hover{background:var(--blush-soft)}
.btn-google{display:flex;align-items:center;justify-content:center;gap:12px;width:100%;padding:14px 18px;margin-top:14px;border:1.5px solid var(--line);border-radius:14px;background:var(--surface);color:var(--ink);font-weight:600;font-size:15px;font-family:Inter,sans-serif;cursor:pointer;transition:box-shadow .15s,transform .1s;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.btn-google:hover{box-shadow:0 4px 16px rgba(0,0,0,.13)}
.btn-google:active{transform:translateY(1px)}
.btn-add{padding:11px 16px;border:1.5px solid var(--wine);border-radius:12px;background:none;color:var(--wine);font-weight:700;font-size:14px;cursor:pointer;font-family:Inter,sans-serif}
.btn-add:disabled{opacity:.35;cursor:default}
.btn-confirm{border:none;color:#fff;background:linear-gradient(135deg,#d90068,#ed0c72 55%,#f4378f);box-shadow:0 7px 18px rgba(220,0,99,.2);transition:filter .15s,transform .1s}
.btn-confirm:hover{filter:brightness(1.06)}
.btn-confirm:active{transform:translateY(1px)}
.btn-confirm:disabled{opacity:.4;cursor:default;box-shadow:none}
.btn-x{border:none;background:none;color:#b08d95;font-size:16px;cursor:pointer;padding:4px 8px}
.btn-small{padding:7px 14px;border:1.5px solid var(--wine);border-radius:10px;background:none;color:var(--wine);font-weight:700;font-size:13px;cursor:pointer;font-family:Inter,sans-serif}
.btn-small.filled{background:var(--wine);color:#fff;border-color:var(--wine)}
.btn-small:disabled{opacity:.35;cursor:default}
.budgetrow{display:flex;justify-content:space-between;align-items:baseline;font-size:13px;font-weight:600;color:var(--muted);margin-bottom:6px}
.budgetrow .n{font-family:'Playfair Display',serif;font-size:22px;color:var(--wine)}
.budget-bar{height:10px;border-radius:999px;background:var(--blush-soft);overflow:hidden}
.budget-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-soft));transition:width .25s}
.panel{border:1px solid var(--line);border-radius:12px;margin:10px 0;overflow:hidden;background:var(--surface)}
.phead{width:100%;text-align:left;background:var(--blush-soft);border:none;padding:12px 14px;font-weight:700;color:var(--wine);cursor:pointer;font-size:14px;font-family:Inter,sans-serif;display:flex;justify-content:space-between}
.pbody{padding:12px 14px;font-size:14px;line-height:1.6;color:var(--ink)}
.pbody ul{margin:6px 0;padding-left:18px}
.pbody li{margin:4px 0}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;margin:8px 0}
.field{flex:1;min-width:130px}
label.small{font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--soft-text);display:block;margin-bottom:5px}
select,input[type=text],input[type=email]{width:100%;padding:10px;border:1px solid var(--line);border-radius:10px;background:var(--surface);font-size:14px;color:var(--ink);font-family:Inter,sans-serif}
input[type=range]{width:100%;accent-color:var(--rose)}
.stakebox{display:flex;align-items:center;gap:10px}
.stakeval{font-family:'Playfair Display',serif;font-size:24px;color:var(--wine);min-width:58px;text-align:center}
.pickchip{display:flex;justify-content:space-between;align-items:center;gap:8px;border:1px solid var(--line);border-radius:12px;padding:10px 13px;margin:7px 0;background:var(--surface)}
.pickchip .nm{font-weight:600;font-size:14px}
.subtle{color:var(--soft-text);font-size:12px;line-height:1.45}
.receipt{border-left:3px solid var(--gold);background:#fffaf1;padding:10px 13px;border-radius:0 10px 10px 0;margin:8px 0;font-variant-numeric:tabular-nums}
.receipt.miss{border-left-color:#dcb9c1;background:#fbf1f3}
.receipt.pending{border-left-color:#b9a7dc;background:#f6f3fb}
.receipt .who{font-weight:700;font-size:14px}
.receipt .pts{float:right;font-family:'Playfair Display',serif;font-size:19px;color:var(--wine)}
.receipt.miss .pts{color:var(--miss);font-size:15px}
.math{font-size:12.5px;color:var(--muted);margin-top:3px;clear:both}
.evt{border:1px solid var(--line);border-radius:14px;padding:14px 16px;margin:12px 0;background:linear-gradient(180deg,#fff,#fdf5f6)}
.evt h3{margin:0}
.evt .sub{font-size:13px;color:var(--muted);margin-top:2px}
.warnchip{display:inline-block;vertical-align:middle;font-size:9.5px;font-weight:700;letter-spacing:.06em;color:#8a6116;background:#f7e8c8;border:1px solid #e3cd93;padding:2px 8px;border-radius:999px;text-transform:uppercase;margin-left:6px}
.lb table{width:100%;border-collapse:collapse;font-variant-numeric:tabular-nums}
.lb th,.lb td{padding:9px 6px;text-align:right;border-bottom:1px solid var(--line);font-size:14px}
.lb th{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--soft-text)}
.lb th:first-child,.lb td:first-child{text-align:left}
.lb tr.you td{font-weight:700;color:var(--wine)}
.lb td.tot{font-family:'Playfair Display',serif;font-size:17px;color:var(--wine)}
.gatecard{text-align:center}
.crown{font-size:44px;line-height:1}
.winner{font-family:'Playfair Display',serif;font-size:28px;color:var(--wine);margin:4px 0}
.notice{border:1px dashed #e3cd93;background:#fdf8ec;border-radius:12px;padding:11px 14px;font-size:13px;color:#6d5324;line-height:1.5;margin:10px 0}
.loading{text-align:center;padding:60px 20px;color:var(--soft-text);font-size:15px}
.loading .spinner{font-size:28px;animation:spin 1.2s linear infinite;display:block;margin-bottom:12px}
@keyframes spin{to{transform:rotate(360deg)}}
.errcard{border:1px solid #f4b8c4;background:#fff5f7;border-radius:16px;padding:20px;margin:14px 0;color:var(--wine-deep)}
.errcard h3{color:var(--wine);margin:0 0 8px;font-family:'Playfair Display',serif}
.savebadge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;padding:3px 9px;border-radius:999px;margin-left:6px;vertical-align:middle}
.savebadge.saving{color:var(--muted);background:var(--blush-soft)}
.savebadge.saved{color:#2e7d4f;background:#e8f5e9}
.savebadge.error{color:#b71c1c;background:#ffebee}
.user-bar{display:flex;align-items:center;justify-content:center;gap:10px;margin-top:5px;flex-wrap:wrap}
.user-avatar{width:28px;height:28px;border-radius:50%;border:2px solid var(--line)}
.user-name{font-size:13px;font-weight:600;color:var(--muted)}
.btn-signout,.btn-how{font-size:12px;color:var(--soft-text);background:none;border:1px solid var(--line);border-radius:8px;padding:3px 10px;cursor:pointer;font-family:Inter,sans-serif}
.btn-signout:hover,.btn-how:hover{background:var(--blush-soft)}
.btn-danger{padding:7px 10px;border:1px solid #d58a99;border-radius:9px;background:var(--surface);color:#b93356;font-weight:700;font-size:12px;cursor:pointer;font-family:Inter,sans-serif}
.btn-danger:hover{background:#fff0f3}
.modal-backdrop{position:fixed;inset:0;background:rgba(43,18,32,.42);display:flex;align-items:center;justify-content:center;padding:18px;z-index:20}
.modal{width:min(610px,100%);max-height:88vh;overflow:auto;background:var(--card);border:1px solid var(--line);border-radius:18px;padding:22px;box-shadow:0 20px 60px rgba(43,18,32,.28)}
.modal h2{font-family:'Playfair Display',Georgia,serif;color:var(--wine);font-size:26px;margin:0 0 6px}
.modal h3{font-family:'Playfair Display',Georgia,serif;color:var(--wine);font-size:18px;margin:18px 0 6px}
.modal p,.modal li{color:var(--ink);font-size:14px;line-height:1.55}
.login-card{text-align:center}
.login-card .heart-hero{font-size:52px;line-height:1;margin-bottom:8px}
.pool-row{display:flex;justify-content:space-between;align-items:center;gap:10px;border:1px solid var(--line);border-radius:14px;padding:14px 16px;margin:10px 0;background:var(--surface);cursor:pointer;transition:box-shadow .15s}
.pool-row:hover{box-shadow:0 4px 16px rgba(110,31,59,.1)}
.pool-row .pname{font-family:'Playfair Display',serif;font-size:18px;color:var(--wine);font-weight:700}
.pool-row .pmeta{font-size:12px;color:var(--soft-text);margin-top:2px}
.invite-row{border:1px dashed var(--gold);border-radius:14px;padding:14px 16px;margin:10px 0;background:#fffaf1}
.invite-row .iname{font-weight:700;color:var(--wine);font-size:15px}
.invite-row .imeta{font-size:12.5px;color:var(--gold);margin:3px 0 10px}
.invite-actions{display:flex;gap:8px}
.email-chip{display:inline-flex;align-items:center;gap:6px;background:var(--blush-soft);color:var(--wine);font-size:13px;font-weight:600;padding:5px 10px;border-radius:999px;margin:3px 4px 3px 0}
.email-chip button{border:none;background:none;color:var(--rose);cursor:pointer;font-size:13px;padding:0}
.tabbar{display:flex;gap:6px;justify-content:center;margin:12px 0 4px}
.tabbar button{padding:8px 18px;border-radius:999px;border:1.5px solid var(--line);background:var(--surface);color:var(--muted);font-weight:700;font-size:13px;cursor:pointer;font-family:Inter,sans-serif}
.tabbar button.active{background:var(--wine);color:#fff;border-color:var(--wine)}
.member-status{display:flex;align-items:center;gap:8px;padding:8px 0;font-size:14px;border-bottom:1px solid var(--line)}
.member-status:last-child{border-bottom:none}
.member-status .dot{width:9px;height:9px;border-radius:50%}
.dot.done{background:#2e7d4f}
.dot.waiting{background:#c99a3f}
.backlink{display:inline-block;font-size:13px;color:var(--rose);font-weight:600;cursor:pointer;background:none;border:none;font-family:Inter,sans-serif;padding:0;margin-bottom:4px}
.divider{border:none;border-top:1px solid var(--line);margin:16px 0}
.mkt-title{display:flex;align-items:baseline;justify-content:space-between}
.multpill{font-size:11px;font-weight:700;color:var(--wine);background:var(--blush-soft);padding:3px 9px;border-radius:999px;white-space:nowrap}
.btn-settings{position:absolute;right:0;top:18px;width:42px;height:42px;border-radius:50%;border:1px solid var(--line);background:var(--card);color:var(--wine);font-size:21px;line-height:1;cursor:pointer;display:grid;place-items:center;box-shadow:0 6px 18px rgba(67,17,39,.08)}
.btn-settings:hover{background:var(--blush-soft)}
.theme-options{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:12px 0 4px}
.theme-choice{border:1.5px solid var(--line);border-radius:14px;background:var(--surface);color:var(--ink);padding:13px 12px;font:600 14px Inter,sans-serif;cursor:pointer;text-align:left}
.theme-choice.active{border-color:var(--rose);box-shadow:0 0 0 2px color-mix(in srgb,var(--rose) 18%,transparent);color:var(--rose)}
.theme-choice span{display:block;font-size:20px;margin-bottom:5px}
.danger-zone{border:1px solid #d58a99;border-radius:14px;padding:14px;margin-top:18px;background:color-mix(in srgb,#d7375f 7%,var(--card))}
.danger-zone h3{color:#b93356;margin-top:0}
.danger-row{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--line)}
.danger-row:last-child{border-bottom:none}
.danger-confirm{margin-top:12px;padding-top:12px;border-top:1px solid var(--line)}
.danger-confirm label{font-size:13px;color:var(--ink);display:block;margin-bottom:7px}
.btn-danger-wide{display:block;width:100%;padding:12px 14px;margin-top:10px;border:1px solid #c52d55;border-radius:12px;background:#b71f49;color:#fff;font:700 14px Inter,sans-serif;cursor:pointer}
.btn-danger-wide:disabled{opacity:.35;cursor:default}
.cast-board{padding:0;overflow:hidden}
.cast-board-head{width:100%;border:none;background:linear-gradient(135deg,var(--blush-soft),var(--surface));color:var(--wine);padding:16px 18px;display:flex;align-items:center;justify-content:space-between;gap:14px;text-align:left;cursor:pointer;font-family:Inter,sans-serif}
.cast-board-head strong{display:block;font-family:'Playfair Display',Georgia,serif;font-size:21px}
.cast-board-head span{display:block;color:var(--muted);font-size:12px;line-height:1.4;margin-top:2px}
.cast-board-toggle{font-size:22px;font-weight:500;color:var(--rose);line-height:1}
.cast-board-body{padding:14px 16px 17px}
.cast-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:11px}
.cast-person{min-width:0;border:1px solid var(--line);border-radius:13px;overflow:hidden;background:var(--surface);position:relative}
.cast-person.engaged{border-color:color-mix(in srgb,var(--rose) 55%,var(--line));box-shadow:0 0 0 2px color-mix(in srgb,var(--rose) 10%,transparent)}
.cast-photo{aspect-ratio:4/5;background:linear-gradient(145deg,var(--blush-soft),var(--line));display:grid;place-items:center;overflow:hidden}
.cast-photo img{display:block;width:100%;height:100%;object-fit:cover}
.cast-initials{font-family:'Playfair Display',Georgia,serif;font-size:30px;font-weight:700;color:var(--wine);letter-spacing:.02em}
.cast-person-name{font-size:12px;font-weight:700;color:var(--ink);padding:8px 7px 9px;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cast-status{position:absolute;top:7px;right:7px;background:rgba(67,17,39,.88);color:#fff;font-size:8px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;padding:3px 6px;border-radius:999px}
:root[data-theme="dark"] .cast-board-head{background:linear-gradient(135deg,#3a1b29,var(--surface))}
:root[data-theme="dark"] body{background:radial-gradient(900px 500px at 82% -10%,#351522 0%,transparent 62%),radial-gradient(800px 460px at -12% 10%,#29121d 0%,transparent 58%),var(--cream)}
:root[data-theme="dark"] .card{box-shadow:0 10px 28px rgba(0,0,0,.22)}
:root[data-theme="dark"] .seasonpill{background:#3a1b29;color:#f3dbe4;border:1px solid #5b2d41}
:root[data-theme="dark"] .step.cur,:root[data-theme="dark"] .tabbar button.active{background:#e78cab;color:#241019;border-color:#e78cab;box-shadow:none}
:root[data-theme="dark"] .btn-primary{background:linear-gradient(135deg,#c85f83,#e78cab 60%,#f3a4be);color:#241019;box-shadow:0 10px 26px rgba(0,0,0,.3)}
:root[data-theme="dark"] .btn-confirm{background:linear-gradient(135deg,#c85f83,#e78cab 60%,#f3a4be);color:#241019;box-shadow:0 7px 18px rgba(0,0,0,.3)}
:root[data-theme="dark"] .btn-secondary,:root[data-theme="dark"] .btn-add,:root[data-theme="dark"] .btn-small{border-color:#8f4965;color:#f0c8d6}
:root[data-theme="dark"] .btn-small.filled{background:#e78cab;color:#241019;border-color:#e78cab}
:root[data-theme="dark"] .btn-secondary:hover,:root[data-theme="dark"] .btn-how:hover,:root[data-theme="dark"] .btn-signout:hover{background:#3a1b29}
:root[data-theme="dark"] .receipt{background:#2b2118}:root[data-theme="dark"] .receipt.miss{background:#301820}:root[data-theme="dark"] .receipt.pending{background:#261d34}
:root[data-theme="dark"] .evt{background:linear-gradient(180deg,#2b1621,#211019)}
:root[data-theme="dark"] .notice{background:#2b2416;color:#efdca3;border-color:#796938}
:root[data-theme="dark"] .errcard{background:#35151f;color:#f3dbe4;border-color:#7e3d54}
:root[data-theme="dark"] .invite-row{background:#2b2118}
:root[data-theme="dark"] .btn-danger,:root[data-theme="dark"] .danger-zone h3{color:#f0a5bc}
:root[data-theme="dark"] .btn-danger:hover{background:#3a1b29}

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.2.0/firebase-app.js';
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
  from 'https://www.gstatic.com/firebasejs/11.2.0/firebase-auth.js';
import { getFirestore, doc, getDoc, setDoc, updateDoc, addDoc, collection, query, where, getDocs, arrayUnion, runTransaction, writeBatch }
  from 'https://www.gstatic.com/firebasejs/11.2.0/firebase-firestore.js';
const firebaseConfig = {
  apiKey: "AIzaSyDmP4Y7-mFQNvbbd2EpKqY0WAPNO96LzEs",
  authDomain: "lib-oauth.firebaseapp.com",
  projectId: "lib-oauth",
  storageBucket: "lib-oauth.firebasestorage.app",
  messagingSenderId: "737647208245",
  appId: "1:737647208245:web:df790bfdf2ca546fa80e7c"
};
const fbApp = initializeApp(firebaseConfig);
const auth  = getAuth(fbApp);
const db    = getFirestore(fbApp);
const GAME_PHASES = ['pods','dating','weddings','reunion'];
const inviteDocId = (poolId,email) => poolId+'__'+email.toLowerCase();
window._fb = {
  signIn:  () => signInWithPopup(auth, new GoogleAuthProvider()),
  signOut: () => signOut(auth),
  onAuthStateChanged: (cb) => onAuthStateChanged(auth, cb),
  getProfile: async (uid) => {
    const s = await getDoc(doc(db,'users',uid));
    return s.exists() ? s.data() : null;
  },
  setProfile: (uid, data) => setDoc(doc(db,'users',uid), data),
  myPools: async (uid) => {
    const q1 = query(collection(db,'pools'), where('members','array-contains',uid));
    const snap = await getDocs(q1);
    return snap.docs.map(d=>({id:d.id, ...d.data()}));
  },
  createPool: async (name, ownerUid, rulesSnapshot, season) => {
    const ref = await addDoc(collection(db,'pools'), {
      name, ownerUid, members:[ownerUid], rulesSnapshot,
      season:{
        id:season.id,label:season.label,country:season.country,countryCode:season.countryCode,
        seasonNumber:season.seasonNumber,locationLabel:season.locationLabel||null
      },
      createdAt:Date.now()
    });
    return ref.id;
  },
  freezePoolRules: (poolId, rulesSnapshot) => updateDoc(doc(db,'pools',poolId), {rulesSnapshot}),
  getPool: async (poolId) => {
    const s = await getDoc(doc(db,'pools',poolId));
    return s.exists() ? {id:s.id, ...s.data()} : null;
  },
  myInvites: async (email) => {
    if (!email) return [];
    const q1 = query(collection(db,'invites'), where('toEmail','==',email.toLowerCase()), where('status','==','pending'));
    const snap = await getDocs(q1);
    return snap.docs.map(d=>({id:d.id, ...d.data()}));
  },
  poolInvites: async (poolId) => {
    try {
      const snap = await getDocs(query(collection(db,'invites'), where('poolId','==',poolId), where('status','==','pending')));
      return snap.docs.map(d=>({id:d.id, ...d.data()}));
    } catch(e) { console.warn('Could not load pending invitations.', e); return []; }
  },
  sendInvite: (poolId, poolName, seasonLabel, fromUid, fromUsername, toEmail) =>
    setDoc(doc(db,'invites',inviteDocId(poolId,toEmail)), {poolId, poolName, seasonLabel, fromUid, fromUsername, toEmail:toEmail.toLowerCase(), status:'pending', createdAt:Date.now()}),
  acceptInvite: async (invite, uid) => {
    await runTransaction(db, async tx => {
      const inviteRef = doc(db,'invites',invite.id);
      const poolRef = doc(db,'pools',invite.poolId);
      const inviteSnap = await tx.get(inviteRef);
      if (!inviteSnap.exists() || inviteSnap.data().status !== 'pending') throw new Error('This invitation is no longer available.');
      tx.update(poolRef, {members: arrayUnion(uid)});
      tx.update(inviteRef, {status:'accepted'});
    });
  },
  declineInvite: (inviteId) => updateDoc(doc(db,'invites',inviteId), {status:'declined'}),
  deletePool: async (pool) => {
    // Pool members can send invitations, so an owner deleting the pool must
    // remove every invitation associated with it, regardless of sender.
    const invites = await getDocs(query(
      collection(db,'invites'),
      where('poolId','==',pool.id)
    ));
    const batch = writeBatch(db);
    const members = Array.isArray(pool.members) ? pool.members : [];

    // These document IDs are deterministic. Delete them directly instead of
    // reading other players' unrevealed predictions into the owner's browser.
    members.forEach(uid => {
      batch.delete(doc(db,'pools',pool.id,'players',uid));
      GAME_PHASES.forEach(phase => {
        batch.delete(doc(db,'pools',pool.id,'phasePicks',phase+'__'+uid));
      });
    });
    GAME_PHASES.forEach(phase => {
      batch.delete(doc(db,'pools',pool.id,'phaseStatus',phase));
    });
    invites.docs.forEach(invite => batch.delete(invite.ref));
    batch.delete(doc(db,'pools',pool.id));
    await batch.commit();
  },
  savePlayer: async (poolId, uid, data) => {
    const batch = writeBatch(db);
    const {picks={}, ...publicState} = data;
    // Public status never contains picks. Replacing the document also removes legacy embedded picks.
    batch.set(doc(db,'pools',poolId,'players',uid), publicState);
    const activePhase = GAME_PHASES.includes(publicState.phase) ? publicState.phase : 'pods';
    // A revealed phase is immutable. Its picks were saved when the player locked
    // them, so close/final-screen saves only need to update the public player doc.
    if (!publicState.completed?.[activePhase]) {
      batch.set(
        doc(db,'pools',poolId,'phasePicks',activePhase+'__'+uid),
        {uid,phase:activePhase,picks:Array.isArray(picks[activePhase])?picks[activePhase]:[],updatedAt:Date.now()}
      );
    }
    await batch.commit();
  },
  completePhase: async (poolId, phase, uid) => runTransaction(db, async tx => {
    const poolRef = doc(db,'pools',poolId);
    const statusRef = doc(db,'pools',poolId,'phaseStatus',phase);
    const [poolSnap,statusSnap] = await Promise.all([tx.get(poolRef),tx.get(statusRef)]);
    if (!poolSnap.exists() || !poolSnap.data().members.includes(uid)) throw new Error('You are not a member of this pool.');
    const completedMembers = [...new Set([...(statusSnap.exists()?statusSnap.data().completedMembers||[]:[]),uid])];
    const revealed = poolSnap.data().members.every(member=>completedMembers.includes(member));
    tx.set(statusRef,{completedMembers,revealed,updatedAt:Date.now()},{merge:true});
  }),
  loadAllPlayers: async (poolId, currentUid) => {
    const toPlayer = d => {
      const {picks:legacyPicks={},...publicState}=d.data();
      return {...publicState,picks:{
        pods:Array.isArray(legacyPicks.pods)?legacyPicks.pods:[],
        dating:Array.isArray(legacyPicks.dating)?legacyPicks.dating:[],
        weddings:Array.isArray(legacyPicks.weddings)?legacyPicks.weddings:[],
        reunion:Array.isArray(legacyPicks.reunion)?legacyPicks.reunion:[],
      }};
    };
    const players = {};
    const status = {};
    try {
      const snap = await getDocs(collection(db,'pools',poolId,'players'));
      snap.docs.forEach(d => { players[d.id]=toPlayer(d); });
    } catch (e) {
      // Older rules may permit a player to read only their own record.
      console.warn('Loading this player’s record only.', e);
      if (currentUid) {
        const own = await getDoc(doc(db,'pools',poolId,'players',currentUid));
        if (own.exists()) players[currentUid]=toPlayer(own);
      }
    }
    await Promise.all(GAME_PHASES.map(async phase => {
      try {
        const statusSnap = await getDoc(doc(db,'pools',poolId,'phaseStatus',phase));
        if (statusSnap.exists()) status[phase] = statusSnap.data();
        if (statusSnap.exists() && statusSnap.data().revealed) {
          const pickSnap = await getDocs(query(collection(db,'pools',poolId,'phasePicks'),where('phase','==',phase)));
          pickSnap.docs.forEach(d=>{ const v=d.data(); if(players[v.uid]) players[v.uid].picks[phase]=Array.isArray(v.picks)?v.picks:[]; });
        } else if (currentUid && players[currentUid]) {
          const own = await getDoc(doc(db,'pools',poolId,'phasePicks',phase+'__'+currentUid));
          if (own.exists()) players[currentUid].picks[phase]=Array.isArray(own.data().picks)?own.data().picks:[];
        }
      } catch (e) { console.warn('New phase storage is not available for this pool yet.', e); }
    }));
    return {players, status};
  },
  getUsers: async (uids) => {
    const out = {};
    await Promise.all(uids.map(async u => {
      try {
        const s = await getDoc(doc(db,'users',u));
        if (s.exists()) out[u] = s.data();
      } catch (e) {
        console.warn('A player profile could not be loaded.', e);
      }
    }));
    return out;
  },
};
window.dispatchEvent(new Event('firebase-ready'));

async function fetchTab(t,sheetId) {
  const res = await fetch(csvUrl(t,sheetId),{cache:'no-store'});
  if (!res.ok) throw new Error(`Failed to fetch tab "${t}" (${res.status})`);
  const body=await res.text();
  if(body.trimStart().startsWith('<')) {
    throw new Error("The season sheet isn't shared publicly (Anyone with the link → Viewer).");
  }
  return parseCSV(body);
}
function parseCSV(text) {
  const rows = []; let row = [], field = '', inQ = false;
  const pushField = () => { row.push(field.trim()); field = ''; };
  const pushRow = () => { pushField(); if (row.some(c=>c!=='')) rows.push(row); row = []; };
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    if (ch === '"') {
      if (inQ && text[i+1] === '"') { field += '"'; i++; }
      else inQ = !inQ;
    } else if (ch === ',' && !inQ) pushField();
    else if ((ch === '\n' || ch === '\r') && !inQ) {
      if (ch === '\r' && text[i+1] === '\n') i++;
      pushRow();
    } else field += ch;
  }
  if (field || row.length) pushRow();
  return rows;
}
function toObjects(rows) {
  if (rows.length < 2) return [];
  const headers = rows[0].map(h => h.toLowerCase().replace(/[^a-z0-9]/g, '_').replace(/_+/g, '_'));
  return rows.slice(1).filter(r => r.some(c => c !== '')).map(r =>
    Object.fromEntries(headers.map((h, i) => [h, r[i] || ''])));
}

async function loadConfig(seasonId=DEFAULT_SEASON_ID) {
  const season=seasonById(seasonId);
  if(!season?.available||!season.sheetId) throw new Error('This season is not available yet.');
  const [castR, couplesR, datingR, reunionR, settR] = await Promise.all([

function Scoreboard({eng, playersById, statusDocs={}, memberLabels, meId, myPhase, pendingInvites=[]}) {
  const {RULES,RESULTS_READY:resultsReady,scorePhase} = eng;
  const memberIds = Object.keys(playersById);
  const [openPhase, setOpenPhase] = useState(null);
  // Per-phase status. The phaseStatus documents are the single source of truth
  // for completion + reveal; per-player completed flags are only a fallback for
  // legacy pools that predate phaseStatus. This prevents the desync where player
  // docs said "done" but picks were never revealed, silently scoring zeros.
  const phaseStatus = {};
  PH_ORDER.forEach(ph => {
    const sdoc = statusDocs[ph];
    if (sdoc) {
      const completedBy = memberIds.filter(id => (sdoc.completedMembers||[]).includes(id));
      phaseStatus[ph] = { completedBy, allDone: !!sdoc.revealed && completedBy.length === memberIds.length };
    } else {
      const completedBy = memberIds.filter(id => playersById[id].completed && playersById[id].completed[ph]);
      phaseStatus[ph] = { completedBy, allDone: memberIds.length > 0 && completedBy.length === memberIds.length };
    }
  });
  // Totals appear only after every player finishes and the sheet results are ready.
  const grandTotals = {};
  memberIds.forEach(id=>grandTotals[id]=0);
  const phaseTotals = {};
  PH_ORDER.forEach(ph => {
    if (!phaseStatus[ph].allDone||!resultsReady[ph]) return;
    const picksBy = {};
    memberIds.forEach(id => picksBy[id] = (playersById[id].picks && playersById[id].picks[ph]) || []);
    const {totals} = scorePhase(ph, picksBy);
    phaseTotals[ph] = totals;
    memberIds.forEach(id => grandTotals[id] += totals[id] || 0);
  });
  const ranked = memberIds.slice().sort((a,b)=>grandTotals[b]-grandTotals[a]);
  const donePhases = PH_ORDER.filter(ph=>phaseStatus[ph].allDone&&resultsReady[ph]);
  const awaitingResults = PH_ORDER.filter(ph=>phaseStatus[ph].allDone&&!resultsReady[ph]);
  return <React.Fragment>
    <div className="card">
      <h2>Standings</h2>
      {donePhases.length===0&&awaitingResults.length===0&&<p className="lede">No phases fully completed yet. Scores appear once everyone in the pool finishes a phase.</p>}
      {donePhases.length===0&&awaitingResults.length>0&&<p className="lede">No scores have been finalized yet.</p>}
      {awaitingResults.length>0&&<div className="notice">{awaitingResults.map(ph=>RULES.phases[ph].label).join(', ')} results are being confirmed. Scores will appear after the season sheet is marked ready.</div>}
      {donePhases.length>0 && <div className="lb"><table>
        <thead><tr><th>Player</th>{donePhases.map(p=><th key={p}>{RULES.phases[p].label}</th>)}<th>Total</th></tr></thead>
        <tbody>{ranked.map(id=><tr key={id} className={id===meId?'you':''}>
          <td>{id===meId?'You':memberLabels[id]}</td>
          {donePhases.map(p=><td key={p}>{phaseTotals[p][id]||0}</td>)}
          <td className="tot">{grandTotals[id]}</td>
        </tr>)}</tbody>
      </table></div>}
    </div>
    {pendingInvites.length>0 && <div className="card">
      <h3>Invitations pending</h3>
      <p className="lede">These people have been invited but have not joined the pool yet.</p>
      {pendingInvites.map(inv=><div className="member-status" key={inv.id}>
        <span className="dot waiting"></span><span>{inv.toEmail}</span>
        <span className="subtle" style={{marginLeft:'auto'}}>Invitation pending</span>
      </div>)}
    </div>}
    {PH_ORDER.map(ph => {
      const st = phaseStatus[ph];
      const isCurrent = ph === myPhase;
      const notStarted = st.completedBy.length===0 && !isCurrent && PH_ORDER.indexOf(ph)>PH_ORDER.indexOf(myPhase);
      if (notStarted) return null;
      return <div className="card" key={ph}>
        <h3>{RULES.phases[ph].label}</h3>
        {st.allDone&&resultsReady[ph] ? <React.Fragment>
          <button className="btn-small" onClick={()=>setOpenPhase(openPhase===ph?null:ph)}>
            {openPhase===ph ? 'Hide prediction breakdown' : 'Show prediction breakdown'}
          </button>
          {openPhase===ph && (()=>{
            const picksBy={};
            memberIds.forEach(id=>picksBy[id]=(playersById[id].picks&&playersById[id].picks[ph])||[]);
            const {entries}=scorePhase(ph,picksBy);
            return <div style={{marginTop:10}}>
              {memberIds.map(id=><div key={id}>
                <h3 style={{marginTop:12}}>{id===meId?'Your predictions':memberLabels[id]}</h3>
                {entries.filter(e=>e.member===id).length===0&&<p className="subtle">No predictions this phase.</p>}
                {entries.filter(e=>e.member===id).map((e,i)=><Receipt key={i} e={e} eng={eng} meId={meId} memberLabels={memberLabels}/>)}
              </div>)}
            </div>;
          })()}
        </React.Fragment> : st.allDone ? <div className="notice">Everyone has finished. Results are being confirmed.</div> : <React.Fragment>
          {memberIds.map(id=><div className="member-status" key={id}>
            <span className={'dot '+(st.completedBy.includes(id)?'done':'waiting')}></span>
            <span>{id===meId?'You':memberLabels[id]}</span>
            <span className="subtle" style={{marginLeft:'auto'}}>{st.completedBy.includes(id)?'Completed':(playersById[id]?.phase===ph&&playersById[id]?.screen==='watch'?'Locked and watching':'Still predicting...')}</span>
          </div>)}
          <p className="subtle" style={{marginTop:8}}>Predictions stay hidden until everyone completes this phase.</p>
        </React.Fragment>}
      </div>;
    })}
  </React.Fragment>;
}

function SettingsModal({theme,onThemeChange,onClose,pools,activePool,userId,onDeletePool}) {
  const [confirmPool,setConfirmPool]=useState(null);
  const [typedName,setTypedName]=useState('');
  const [deleting,setDeleting]=useState(false);
  const [deleteError,setDeleteError]=useState('');
  const ownedPools=(activePool?[activePool]:pools).filter(p=>p.ownerUid===userId);
  const deleteConfirmed=confirmPool&&typedName.trim()===confirmPool.name;
  const finishDelete=async()=>{
    if(!deleteConfirmed||deleting)return;
    setDeleting(true);
    try{setDeleteError('');await onDeletePool(confirmPool);onClose();}
    catch(e){setDeleteError('The pool could not be deleted. Please try again.');}
    finally{setDeleting(false);}
  };
  return <div className="modal-backdrop" role="presentation" onMouseDown={e=>{if(e.target===e.currentTarget&&!deleting)onClose();}}>
    <div className="modal" role="dialog" aria-modal="true" aria-labelledby="settings-title">

        {confirmPool&&<div className="danger-confirm">

          {deleteError&&<p style={{color:'#b71f49',fontWeight:600}}>{deleteError}</p>}
          <button className="btn-danger-wide" disabled={!deleteConfirmed||deleting} onClick={finishDelete}>{deleting?'Deleting...':'Permanently delete pool'}</button>
          <button className="btn-secondary" disabled={deleting} onClick={()=>{setConfirmPool(null);setTypedName('');}}>Cancel</button>
        </div>}
      </div>}
      <button className="btn-primary" disabled={deleting} onClick={onClose}>Done</button>
    </div>
  </div>;
}

          pool=refetched;

      }
      const poolCfg=applyRuntimeConfig(configForPool(liveCfg,pool));
      setCfg(liveCfg);setActivePool(pool);setPoolPlayers(players);setPoolUsers(users);setPoolStatus(status);setPendingPoolInvites(pending);setEng(makeEngine(poolCfg,pool.members.length));

  /* ── RENDER ── */

            <select id="new-pool-season" value={selectedSeasonId} onChange={e=>setSelectedSeasonId(e.target.value)}>
              {SEASON_BANK.filter(season=>season.available).map(season=><option value={season.id} key={season.id}>{formatSeasonOption(season)}</option>)}
            </select>
            <div className="subtle" style={{marginTop:6}}>{seasonById(selectedSeasonId)?.status==='upcoming'?'You can create the pool and invite friends now. Predictions open after the cast is announced and the season begins.':'The season is permanent once the pool is created.'}</div>
          </div>
        </div>
        <div className="row">
          <div className="field"><label className="small">Invite by email</label>
            <input type="email" value={inviteEmail} onChange={e=>setInviteEmail(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addInviteEmail()} placeholder="friend@email.com"/>
          </div>
          <button className="btn-add" onClick={addInviteEmail}>Add</button>
        </div>
        {inviteList.length>0 && <div style={{margin:'8px 0'}}>
          {inviteList.map(em=><span className="email-chip" key={em}>{em}<button onClick={()=>setInviteList(inviteList.filter(x=>x!==em))}>✕</button></span>)}
        </div>}
        <button className="btn-primary" disabled={!newPoolName.trim()||!selectedSeasonId} onClick={doCreatePool}>Create pool{inviteList.length>0?` & send ${inviteList.length} invite${inviteList.length>1?'s':''}`:''}</button>
        <button className="btn-secondary" onClick={()=>{setCreating(false);setNewPoolName('');setSelectedSeasonId(DEFAULT_SEASON_ID);setInviteList([]);}}>Cancel</button>
      </div>}
    </div>
    <div className="card">
      <h2>Historical season library</h2>
      {HISTORICAL_SEASON_BANK.length===0?<p className="lede">Historical seasons will appear here as their outcomes are added.</p>:HISTORICAL_SEASON_BANK.map(season=><div className="pool-row" key={season.id} onClick={()=>{setSelectedSeasonId(season.id);setCreating(true);}}><div><div className="pname">{formatSeasonLabel(season)}</div><div className="pmeta">Ready to play</div></div><span style={{color:'var(--rose)',fontWeight:700}}>→</span></div>)}
    </div>
    {showHowItWorks&&<HowItWorksModal onClose={closeHowItWorks}/>} 
    {showSettings&&<SettingsModal theme={theme} onThemeChange={changeTheme} onClose={()=>setShowSettings(false)} pools={pools} activePool={null} userId={user.uid} onDeletePool={doDeletePool}/>} 
  </div>;
  /* ── IN POOL ── */
  const {RULES} = eng;
  const phaseIntro = PH_INTRO(phase,RULES,eng);
  const spent = eng.spentBy(picks[phase]);
  // Keep stable UIDs as identity; usernames are display labels only.
  const playersById = {};
  const memberLabels = {};
  if (poolPlayers && poolUsers) {
    activePool.members.forEach(uid => {
      const uname = poolUsers[uid]?.username || (poolPlayers[uid]?.username) || 'Player';
      memberLabels[uid] = uname;
      playersById[uid] = poolPlayers[uid] ? {...poolPlayers[uid],picks:normalizePicks(poolPlayers[uid].picks)} : {picks:freshPicks(), completed:{}};
    });
    // Ensure my latest local state is reflected
    if (user?.uid) playersById[user.uid] = {picks,completed,username:meName,phase,screen,w,watchThrough};
  }
  const saveBadge = saveState && <span className={`savebadge ${saveState}`}>{saveState==='saving'?'saving...':saveState==='saved'?'✓ saved':'! not saved'}</span>;
  const lockTarget=Math.max(w,nextAvailableEnd());
  const lockLabel=lockTarget>w?'Lock it in & watch '+watchRangeLabel(phase,w+1,lockTarget):'Lock predictions';
  const readyWatchEnd=nextAvailableEnd();
  const RevealSummary = () => reveal && <div className="card">
    <h2 style={{marginBottom:10}}>{reveal.rangeLabel||(phase==='reunion'?'The Reunion':'Episode '+reveal.ep)}</h2>
    {reveal.events.length===0&&<div className="evt"><h3>Nothing resolved in this watch-through</h3><div className="sub">The board carries forward.</div></div>}
    {reveal.events.map((ev,i)=><div className="evt" key={i}><h3>{ev.title}{ev.placeholder&&<span className="warnchip">placeholder</span>}</h3>{ev.sub&&<div className="sub">{ev.sub}</div>}</div>)}
    {reveal.entries.map((e,i)=><Receipt key={i} e={e} eng={eng} meId={user.uid} memberLabels={memberLabels}/>)}
  </div>;
  return <div className="app">
    <BrandHeader season={seasonLabelForPool(activePool)}>
      <button className="btn-settings" aria-label="Settings" title="Settings" onClick={()=>setShowSettings(true)}>⚙</button>
      <h1>{activePool.name} {saveBadge}</h1>
      <div className="user-bar">
        <button className="backlink" onClick={()=>{setPoolTab('play');if(screen==='board'&&!completed[phase]) setScreen('intro');}}>Pool Home</button>
        <button className="backlink" onClick={exitPool}>← All pools</button>
        {user.photoURL && <img className="user-avatar" src={user.photoURL} alt=""/>}
        <span className="user-name">{meName}</span>
        <button className="btn-how" onClick={()=>setShowHowItWorks(true)}>How It Works</button>
        <button className="btn-signout" onClick={handleSignOut}>Sign out</button>
      </div>
    </BrandHeader>
    {err && <div className="errcard" role="alert"><h3>Something went wrong</h3><p>{err}</p></div>}
    <div className="tabbar">
      <button className={poolTab==='play'?'active':''} onClick={()=>setPoolTab('play')}>Play</button>
      {cfg.PLAYABLE&&<button className={poolTab==='standings'?'active':''} onClick={()=>{setPoolTab('standings');refreshPool();}}>Standings</button>}
      <button className={poolTab==='members'?'active':''} onClick={()=>{setPoolTab('members');setPoolInviteFeedback('');refreshPool();}}>Members</button>
    </div>
    {poolTab==='play'&&cfg.BOUNDARIES_LIVE&&<div className="notice">Phase boundaries for this season are live from the season sheet and may shift between refreshes.</div>}
    {poolTab==='standings' && poolPlayers && <Scoreboard eng={eng} playersById={playersById} statusDocs={poolStatus} memberLabels={memberLabels} meId={user.uid} myPhase={phase} pendingInvites={pendingPoolInvites}/>} 
    {poolTab==='members' && <div className="card">
      <h2>Pool members</h2>
      <p className="lede">Anyone in this pool can invite more friends before the first player completes Pods.</p>
      {activePool.members.map(uid=><div className="member-status" key={uid}>
        <span className="dot"></span><span>{uid===user.uid?'You':memberLabels[uid]}</span>
        {uid===activePool.ownerUid&&<span className="subtle" style={{marginLeft:'auto'}}>Pool owner</span>}
      </div>)}
      {pendingPoolInvites.map(inv=><div className="member-status" key={inv.id}>
        <span className="dot waiting"></span><span>{inv.toEmail}</span>
        <span className="subtle" style={{marginLeft:'auto'}}>Invitation pending</span>
      </div>)}
      <hr className="divider"/>
      {poolStatus.pods?<p className="subtle">Invitations are closed because a player has completed Pods.</p>:<React.Fragment>
        <h3>Invite someone</h3>
        <div className="row">
          <div className="field"><label className="small" htmlFor="pool-invite-email">Email address</label>
            <input id="pool-invite-email" type="email" value={poolInviteEmail} onChange={e=>setPoolInviteEmail(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')doSendPoolInvite();}} placeholder="friend@email.com"/>
          </div>
          <button className="btn-add" disabled={sendingPoolInvite||!poolInviteEmail.trim()} onClick={doSendPoolInvite}>{sendingPoolInvite?'Sending...':'Send invitation'}</button>
        </div>
      </React.Fragment>}
      {poolInviteFeedback&&<p style={{color:poolInviteError?'#b71f49':'var(--muted)',fontWeight:600}}>{poolInviteFeedback}</p>}
    </div>}
    {poolTab==='play' && !cfg.PLAYABLE && <div className="card">
      <h2>Your pool is ready</h2>
      <p className="lede">{seasonPoolStatusLabel(seasonForPool(activePool))||'This season has not started yet.'}</p>
      <div className="notice"><b>Season has not started.</b> Use the Members tab to invite your friends now. Predictions will open shortly after the first episodes drop.</div>
      <button className="btn-secondary" onClick={refreshPool}>Check for season updates</button>
    </div>}
    {poolTab==='play' && cfg.PLAYABLE && <React.Fragment>
      <Stepper phase={phase} RULES={RULES}/>
      {screen==='intro'&&<div className="card"><h2>{RULES.phases[phase].label}</h2><p className="lede">{phaseIntro.tagline}</p><Panel title="Rules" defaultOpen>{phaseIntro.rules}</Panel><Panel title="Scoring">{phaseIntro.scoring}</Panel><button className="btn-primary" disabled={gating} onClick={()=>phase==='pods'&&w<PH_STARTW.pods?startPods():setScreen('board')}>{phase==='pods'&&w<PH_STARTW.pods?"I've watched Episode "+PH_STARTW.pods+' - Start predicting':phase==='pods'?'Return to prediction board':'Open the prediction board'}</button></div>}
      {screen==='board'&&<React.Fragment>
        <div className="card">
          <Panel title="Rules">{phaseIntro.rules}</Panel>
          <Panel title="Scoring">{phaseIntro.scoring}</Panel>
        </div>
        <RevealSummary/>
        {phase==='pods'&&<PodsBoard w={w} picks={picks.pods} add={addPick} remove={removePick} spent={spent} eng={eng} onPendingChange={setPendingPodsPrediction} pendingRef={pendingPodsSkip}/>} 
        {phase==='dating'&&<DatingBoard w={w} picks={picks.dating} add={addPick} remove={removePick} spent={spent} eng={eng}/>}
        {phase==='weddings'&&<WeddingsBoard w={w} picks={picks.weddings} add={addPick} remove={removePick} spent={spent} eng={eng}/>}
        {phase==='reunion'&&<ReunionBoard w={w} picks={picks.reunion} add={addPick} remove={removePick} spent={spent} eng={eng}/>} 
        <p className="subtle" style={{textAlign:'center',marginBottom:8}}><b>Important:</b> locking is permanent. You will not be able to edit these predictions afterward.</p>
        <button className="btn-primary" disabled={gating} onClick={lockPredictions}>{lockLabel} →</button>
        {phase==='pods'&&pendingPodsPrediction&&<div className="notice" role="status" style={{margin:'14px 0 0'}}><b>This prediction hasn't been added yet - confirm it to lock it in.</b> <button className="btn-secondary" style={{display:'inline-block',width:'auto',padding:'6px 10px',margin:'8px 0 0'}} onClick={()=>pendingPodsSkip.current()}>Skip this prediction</button></div>}
        <p className="subtle" style={{textAlign:'center'}}>Your predictions are saved and locked before you watch.</p>
      </React.Fragment>}
      {screen==='watch'&&<div className="card gatecard">
        <h2>Your {RULES.phases[phase].label} predictions are locked</h2>
        {watchThrough>w?<React.Fragment>
          <p className="lede">You can now watch {watchRangeLabel(phase,w+1,watchThrough)}. Return here when you finish.</p>
          <button className="btn-primary" disabled={gating} onClick={finishWatch}>I've finished {watchRangeLabel(phase,w+1,watchThrough)} →</button>
        </React.Fragment>:readyWatchEnd>w?<React.Fragment>
          <p className="lede">A new episode batch is ready. Your predictions remain locked.</p>
          <button className="btn-primary" disabled={gating} onClick={beginNextBatch}>Watch {watchRangeLabel(phase,w+1,readyWatchEnd)} →</button>
        </React.Fragment>:<React.Fragment>
          <p className="lede">You are caught up through Episode {w}. Your predictions remain locked. Return after the next episode batch drops.</p>
          <button className="btn-secondary" onClick={refreshPool}>Refresh season data</button>
        </React.Fragment>}
      </div>}
      {screen==='close'&&closeInfo&&<React.Fragment>
        <RevealSummary/>
        <div className="card">
          <h2>{RULES.phases[phase].label} complete</h2>
          {closeInfo.closing.length>0&&<h3 style={{marginTop:10}}>Scores finalized when the phase closes.</h3>}
          {closeInfo.closing.map((e,i)=><Receipt key={i} e={e} eng={eng} meId={user.uid} memberLabels={memberLabels}/>)}
          <div className="notice">{RESULTS_READY[phase]?"Your predictions are locked. Scores and everyone's predictions are revealed on the Standings tab once the whole pool completes this phase.":'Your predictions are locked. Results are being confirmed and scores will appear after the season sheet is marked ready.'}</div>
          {phaseCompletionError&&<div className="errcard" role="alert" style={{marginTop:14}}><h3>Completion not registered</h3><p>{phaseCompletionError}</p><button className="btn-secondary" disabled={retryingPhaseCompletion} onClick={()=>registerPhaseCompletion(activePool.id,phase,user.uid)}>{retryingPhaseCompletion?'Retrying...':'Retry phase completion'}</button></div>}
          <button className="btn-primary" disabled={!!phaseCompletionError||retryingPhaseCompletion} onClick={openNextPhase}>{NEXT_PH[phase]?'Continue to '+RULES.phases[NEXT_PH[phase]].label+' →':'Finish the season →'}</button>
        </div>
      </React.Fragment>}
      {screen==='final'&&<div className="card gatecard">
        <div className="crown">👑</div>
        <div className="winner">Season complete!</div>
        <p className="lede" style={{marginBottom:12}}>Check the Standings tab to see how everyone did once the whole pool has finished.</p>
        <button className="btn-primary" onClick={()=>{setPoolTab('standings');refreshPool();}}>View Standings</button>
      </div>}
      {['intro','board','watch','close'].includes(screen)&&<ContestantReferenceBoard eng={eng} w={w}/>} 
    </React.Fragment>}
    {showHowItWorks&&<HowItWorksModal onClose={closeHowItWorks} rules={eng.RULES}/>} 
    {showSettings&&<SettingsModal theme={theme} onThemeChange={changeTheme} onClose={()=>setShowSettings(false)} pools={pools} activePool={activePool} userId={user.uid} onDeletePool={doDeletePool}/>} 
  </div>;
}
const mountApp = () => ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
if (window._fb) mountApp();
else window.addEventListener('firebase-ready',mountApp,{once:true});
</script>
</body>
</html>
