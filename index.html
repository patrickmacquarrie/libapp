<div id="root"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.2.0/firebase-app.js';
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
  from 'https://www.gstatic.com/firebasejs/11.2.0/firebase-auth.js';
import { getFirestore, doc, getDoc, setDoc, updateDoc, addDoc, collection, query, where, getDocs, arrayUnion, runTransaction, writeBatch }
  from 'https://www.gstatic.com/firebasejs/11.2.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyDmP4Y7-mFQNvbbd2EpKqY0WAPNO96LzEs",
  authDomain: "lib-oauth.firebaseapp.com",
  projectId: "lib-oauth",
  storageBucket: "lib-oauth.firebasestorage.app",
  messagingSenderId: "737647208245",
  appId: "1:737647208245:web:df790bfdf2ca546fa80e7c"
};

const fbApp = initializeApp(firebaseConfig);
const auth  = getAuth(fbApp);
const db    = getFirestore(fbApp);
const GAME_PHASES = ['pods','dating','weddings','reunion'];
const inviteDocId = (poolId,email) => poolId+'__'+email.toLowerCase();

window._fb = {
  signIn:  () => signInWithPopup(auth, new GoogleAuthProvider()),
  signOut: () => signOut(auth),
  onAuthStateChanged: (cb) => onAuthStateChanged(auth, cb),

  getProfile: async (uid) => {
    const s = await getDoc(doc(db,'users',uid));
    return s.exists() ? s.data() : null;
  },
  setProfile: (uid, data) => setDoc(doc(db,'users',uid), data),

  myPools: async (uid) => {
    const q1 = query(collection(db,'pools'), where('members','array-contains',uid));
    const snap = await getDocs(q1);
    return snap.docs.map(d=>({id:d.id, ...d.data()}));
  },
  createPool: async (name, ownerUid) => {
    const ref = await addDoc(collection(db,'pools'), {name, ownerUid, members:[ownerUid], createdAt:Date.now()});
    return ref.id;
  },
  getPool: async (poolId) => {
    const s = await getDoc(doc(db,'pools',poolId));
    return s.exists() ? {id:s.id, ...s.data()} : null;
  },

  myInvites: async (email) => {
    if (!email) return [];
    const q1 = query(collection(db,'invites'), where('toEmail','==',email.toLowerCase()), where('status','==','pending'));
    const snap = await getDocs(q1);
    return snap.docs.map(d=>({id:d.id, ...d.data()}));
  },
  sendInvite: (poolId, poolName, fromUid, fromUsername, toEmail) =>
    setDoc(doc(db,'invites',inviteDocId(poolId,toEmail)), {poolId, poolName, fromUid, fromUsername, toEmail:toEmail.toLowerCase(), status:'pending', createdAt:Date.now()}),
  acceptInvite: async (invite, uid) => {
    await runTransaction(db, async tx => {
      const inviteRef = doc(db,'invites',invite.id);
      const poolRef = doc(db,'pools',invite.poolId);
      const inviteSnap = await tx.get(inviteRef);
      if (!inviteSnap.exists() || inviteSnap.data().status !== 'pending') throw new Error('This invitation is no longer available.');
      tx.update(poolRef, {members: arrayUnion(uid)});
      tx.update(inviteRef, {status:'accepted'});
    });
  },
  declineInvite: (inviteId) => updateDoc(doc(db,'invites',inviteId), {status:'declined'}),

  savePlayer: async (poolId, uid, data) => {
    const batch = writeBatch(db);
    const {picks={}, ...publicState} = data;
    // Public status never contains picks. Replacing the document also removes legacy embedded picks.
    batch.set(doc(db,'pools',poolId,'players',uid), publicState);
    const activePhase = GAME_PHASES.includes(publicState.phase) ? publicState.phase : 'pods';
    batch.set(
      doc(db,'pools',poolId,'phasePicks',activePhase+'__'+uid),
      {uid,phase:activePhase,picks:Array.isArray(picks[activePhase])?picks[activePhase]:[],updatedAt:Date.now()}
    );
    try {
      await batch.commit();
    } catch (e) {
      // Existing pools may still use the original single-document layout.
      // Keep them working until their Firestore data and rules are migrated.
      console.warn('Using legacy player storage until this pool is migrated.', e);
      await setDoc(doc(db,'pools',poolId,'players',uid), data, {merge:true});
    }
  },
  completePhase: async (poolId, phase, uid) => runTransaction(db, async tx => {
    const poolRef = doc(db,'pools',poolId);
    const statusRef = doc(db,'pools',poolId,'phaseStatus',phase);
    const [poolSnap,statusSnap] = await Promise.all([tx.get(poolRef),tx.get(statusRef)]);
    if (!poolSnap.exists() || !poolSnap.data().members.includes(uid)) throw new Error('You are not a member of this pool.');
    const completedMembers = [...new Set([...(statusSnap.exists()?statusSnap.data().completedMembers||[]:[]),uid])];
    const revealed = poolSnap.data().members.every(member=>completedMembers.includes(member));
    tx.set(statusRef,{completedMembers,revealed,updatedAt:Date.now()},{merge:true});
  }),
  loadAllPlayers: async (poolId, currentUid) => {
    const snap = await getDocs(collection(db,'pools',poolId,'players'));
    const out = {};
    snap.docs.forEach(d => {
      const {picks:legacyPicks={},...publicState}=d.data();
      out[d.id]={...publicState,picks:{
        pods:Array.isArray(legacyPicks.pods)?legacyPicks.pods:[],
        dating:Array.isArray(legacyPicks.dating)?legacyPicks.dating:[],
        weddings:Array.isArray(legacyPicks.weddings)?legacyPicks.weddings:[],
        reunion:Array.isArray(legacyPicks.reunion)?legacyPicks.reunion:[],
      }};
    });
    await Promise.all(GAME_PHASES.map(async phase => {
      try {
        const statusSnap = await getDoc(doc(db,'pools',poolId,'phaseStatus',phase));
        if (statusSnap.exists() && statusSnap.data().revealed) {
          const pickSnap = await getDocs(query(collection(db,'pools',poolId,'phasePicks'),where('phase','==',phase)));
          pickSnap.docs.forEach(d=>{ const v=d.data(); if(out[v.uid]) out[v.uid].picks[phase]=Array.isArray(v.picks)?v.picks:[]; });
        } else if (currentUid) {
          const own = await getDoc(doc(db,'pools',poolId,'phasePicks',phase+'__'+currentUid));
          if (own.exists() && out[currentUid]) out[currentUid].picks[phase]=Array.isArray(own.data().picks)?own.data().picks:[];
        }
      } catch (e) { console.warn('New phase storage is not available for this pool yet.', e); }
    }));
    return out;
  },
  getUsers: async (uids) => {
    const out = {};
    await Promise.all(uids.map(async u => {
      const s = await getDoc(doc(db,'users',u));
      if (s.exists()) out[u] = s.data();
    }));
    return out;
  },
};
window.dispatchEvent(new Event('firebase-ready'));
</script>

<script crossorigin="anonymous" integrity="sha512-MOCpqoRoisCTwJ8vQQiciZv0qcpROCidek3GTFS6KTk2+y7munJIlKCVkFCYY+p3ErYFXCjmFjnfTTRSC1OHWQ==" src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

<script type="text/babel" data-presets="react">

const SHEET_ID = '10lXVUtRSNpd4yBCIxHHZiM65abQMCu9LXYoJ22r7ifY';

/* ================================================================== */
/*  SHEET FETCHER                                                      */
/* ================================================================== */

const csvUrl = (t) => `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(t)}`;

async function fetchTab(t) {
  const res = await fetch(csvUrl(t));
  if (!res.ok) throw new Error(`Failed to fetch tab "${t}" (${res.status})`);
  return parseCSV(await res.text());
}

function parseCSV(text) {
  const rows = []; let row = [], field = '', inQ = false;
  const pushField = () => { row.push(field.trim()); field = ''; };
  const pushRow = () => { pushField(); if (row.some(c=>c!=='')) rows.push(row); row = []; };
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    if (ch === '"') {
      if (inQ && text[i+1] === '"') { field += '"'; i++; }
      else inQ = !inQ;
    } else if (ch === ',' && !inQ) pushField();
    else if ((ch === '\n' || ch === '\r') && !inQ) {
      if (ch === '\r' && text[i+1] === '\n') i++;
      pushRow();
    } else field += ch;
  }
  if (field || row.length) pushRow();
  return rows;
}

function toObjects(rows) {
  if (rows.length < 2) return [];
  const headers = rows[0].map(h => h.toLowerCase().replace(/[^a-z0-9]/g, '_').replace(/_+/g, '_'));
  return rows.slice(1).filter(r => r.some(c => c !== '')).map(r =>
    Object.fromEntries(headers.map((h, i) => [h, r[i] || ''])));
}

const pBool = v => String(v).toUpperCase() === 'TRUE';

async function loadConfig() {
  const [castR, couplesR, datingR, reunionR, settR] = await Promise.all([
    fetchTab('Cast'), fetchTab('Couples'), fetchTab('Dating Results'),
    fetchTab('Reunion Results'), fetchTab('Settings'),
  ]);

  const S = Object.fromEntries(toObjects(settR).map(r => [r.key, r.value]));
  const numSetting = (key, fallback, integer=false) => {
    const value = integer ? Number.parseInt(S[key],10) : Number.parseFloat(S[key]);
    return Number.isFinite(value) ? value : fallback;
  };
  const RULES = {
    POINTS_PER_HEART: numSetting('POINTS_PER_HEART',2), K: numSetting('K',1),
    LEAD_STEP: numSetting('LEAD_STEP',0.5), WHO_TAG: numSetting('WHO_TAG',0.25),
    phases: {
      pods:     {budget:numSetting('PODS_BUDGET',200,true),     cap:numSetting('PODS_CAP',60,true),     label:'Pods'},
      dating:   {budget:numSetting('DATING_BUDGET',100,true),   cap:numSetting('DATING_CAP',40,true),   label:'Dating'},
      weddings: {budget:numSetting('WEDDINGS_BUDGET',200,true), cap:numSetting('WEDDINGS_CAP',80,true), label:'Weddings'},
      reunion:  {budget:numSetting('REUNION_BUDGET',100,true),  cap:numSetting('REUNION_CAP',40,true),  label:'Reunion'},
    },
  };

  const castO = toObjects(castR);
  const MEN   = castO.filter(r=>r.gender?.toUpperCase()==='M').map(r=>r.name).filter(Boolean);
  const WOMEN = castO.filter(r=>r.gender?.toUpperCase()==='F').map(r=>r.name).filter(Boolean);

  const COUPLES = toObjects(couplesR).filter(r=>r.id&&r.him&&r.her).map(r=>({
    id:r.id, him:r.him, her:r.her, engagedEp:parseInt(r.engaged_ep)||1,
    wedding:r.wedding||undefined, who:r.who_says_no||undefined,
    breakupEp:r.breakup_ep?parseInt(r.breakup_ep):undefined,
    settledEp:r.settled_ep?parseInt(r.settled_ep):undefined,
    still:r.still_together?pBool(r.still_together):undefined,
  }));

  const DATING_RESULTS = {sex:{},criticize:{},breakup:{coupleId:null,ep:null,confirmed:false}};
  toObjects(datingR).forEach(r=>{
    const mkt=r.market?.toLowerCase(), id=r.couple_id, ep=parseInt(r.episode), conf=pBool(r.confirmed);
    if(!mkt||!id||!ep) return;
    if(mkt==='breakup') DATING_RESULTS.breakup={coupleId:id,ep,confirmed:conf};
    else if(mkt==='sex') DATING_RESULTS.sex[id]={ep,confirmed:conf};
    else if(mkt==='criticize') DATING_RESULTS.criticize[id]={ep,who:r.who_criticize_only||undefined,confirmed:conf};
  });

  const RR = {still:{},back:{},newCouple:null,lifeUpdate:null,absent:null,confrontation:null,placeholders:true};
  let hasRR = false;
  toObjects(reunionR).forEach(r=>{
    const mkt=r.market?.toLowerCase(), id=r.couple_person_id_or_name, val=r.value;
    if(!mkt) return; hasRR=true;
    if(mkt==='still') RR.still[id]=pBool(val);
    else if(mkt==='back') RR.back[id]=true;
    else if(mkt==='newcouple') RR.newCouple=id;
    else if(mkt==='lifeupdate') RR.lifeUpdate={person:id,update:val};
    else if(mkt==='absent') RR.absent=id;
    else if(mkt==='confrontation') { RR.confrontation=[id,val].filter(Boolean); if(RR.confrontation.length<2) RR.confrontation=null; }
  });
  if(hasRR) RR.placeholders=false;

  return {RULES,MEN,WOMEN,COUPLES,DATING_RESULTS,REUNION_RESULTS:RR};
}

/* ================================================================== */
/*  ENGINE — pool-aware, picks keyed by stable member UID              */
/* ================================================================== */

const WED_MULT  = {married:[2.5,2,1.5],saysNo:[3,2.5,2],calledOff:[3,2.5,2]};
const WED_LABEL = {married:'Gets married',saysNo:'Says no at the altar',calledOff:'Called off before the altar'};
const REU_MULT  = {still:1,back:2,newCouple:3,lifeUpdate:3,absent:2,confrontation:2};
const LIFE_UPD  = {engagedNew:'Engaged to someone new',marriedNew:'Married someone new',kid:'Had a kid'};
const PH_ORDER  = ['pods','dating','weddings','reunion'];
const PH_SPAN   = {pods:{endEp:6},dating:{endEp:9},weddings:{endEp:12},reunion:{endEp:13}};
const PH_STARTW = {pods:1,dating:6,weddings:9,reunion:12};
const NEXT_PH   = {pods:'dating',dating:'weddings',weddings:'reunion',reunion:null};
const EMPTY_PICKS = {pods:[],dating:[],weddings:[],reunion:[]};
const freshPicks = () => ({pods:[],dating:[],weddings:[],reunion:[]});
const normalizePicks = value => Object.fromEntries(PH_ORDER.map(ph=>[ph,Array.isArray(value?.[ph])?value[ph]:[]]));

function makeEngine(cfg, poolSize) {
  const {RULES,MEN,WOMEN,COUPLES,DATING_RESULTS,REUNION_RESULTS} = cfg;
  const POOL = Math.max(poolSize, 1);
  const byId    = Object.fromEntries(COUPLES.map(c=>[c.id,c]));
  const isReal  = k=>!!byId[k];
  const nameOf  = k=>isReal(k)?(byId[k].him+' & '+byId[k].her):String(k).split('|').join(' & ');
  const membOf  = k=>isReal(k)?[byId[k].him,byId[k].her]:String(k).split('|');
  const whoNm   = (k,w)=>w==='both'?'both':(w==='him'?membOf(k)[0]:membOf(k)[1]);
  const fmt     = n=>String(+n.toFixed(2));
  const leadM   = f=>1+RULES.LEAD_STEP*Math.max(0,f);
  const contraV = o=>1+RULES.K*(1-o/POOL);
  const owTxt   = o=>o===1?'solo call':(o===POOL?'everyone called it':o+' of '+POOL+' called it');
  const calcPts = (s,m,o,t)=>Math.round(RULES.POINTS_PER_HEART*s*m*contraV(o)*(t||1));

  function mk({member,phase,ok,label,stake,mult,multLabel,owners,tag,tagLabel,note,placeholder,pending}) {
    return {member,phase,ok:!!ok,label,stake,mult,multLabel,owners,tag:tag||1,tagLabel,note,
            placeholder:!!placeholder,pending:!!pending,points:ok&&!pending?calcPts(stake,mult,owners,tag):0};
  }

  /* Resolve one episode across a set of members. picksBy = {memberName: picks[]} */
  function resolveEpisode(phase, ep, picksBy) {
    const MEMBERS = Object.keys(picksBy);
    const all = picksBy;
    const events=[], entries=[];
    if(phase==='pods') {
      COUPLES.filter(c=>c.engagedEp===ep).forEach(c=>{
        const owners=MEMBERS.filter(m=>all[m].some(p=>p.c===c.id)).length;
        events.push({title:nameOf(c.id)+' got engaged',sub:ep===1?'Episode 1 — uncallable by design; no one scores it.':(owners===0?'No one called it.':owTxt(owners))});
        MEMBERS.forEach(m=>all[m].filter(p=>p.c===c.id).forEach(p=>{
          const fore=ep-p.w-1;
          entries.push(mk({member:m,phase,ok:true,label:nameOf(c.id)+' engaged',stake:p.s,mult:leadM(fore),multLabel:'x'+fmt(leadM(fore))+' lead ('+fore+' ep foresight)',owners}));
        }));
      });
    }
    if(phase==='dating') {
      Object.entries(DATING_RESULTS.sex).filter(([,r])=>r.ep===ep).forEach(([id,r])=>{
        const owners=MEMBERS.filter(m=>all[m].some(p=>p.m==='sex'&&p.c===id)).length;
        events.push({title:nameOf(id)+' — referenced sleeping together on camera',sub:owners?owTxt(owners):'No one called it.',placeholder:!r.confirmed});
        MEMBERS.forEach(m=>all[m].filter(p=>p.m==='sex'&&p.c===id).forEach(p=>{
          const fore=ep-p.w-1;
          entries.push(mk({member:m,phase,ok:true,pending:!r.confirmed,label:nameOf(id)+' — slept together',stake:p.s,mult:leadM(fore),multLabel:'x'+fmt(leadM(fore))+' lead ('+fore+' ep foresight)',owners,placeholder:!r.confirmed,note:!r.confirmed?'Awaiting confirmation.':null}));
        }));
      });
      Object.entries(DATING_RESULTS.criticize).filter(([,r])=>r.ep===ep).forEach(([id,r])=>{
        const owners=MEMBERS.filter(m=>all[m].some(p=>p.m==='criticize'&&p.c===id)).length;
        events.push({title:nameOf(id)+' — '+whoNm(id,r.who)+' criticized partner\'s place',sub:owners?owTxt(owners):'No one called it.',placeholder:!r.confirmed});
        MEMBERS.forEach(m=>all[m].filter(p=>p.m==='criticize'&&p.c===id).forEach(p=>{
          const fore=ep-p.w-1, tagged=p.who===r.who;
          entries.push(mk({member:m,phase,ok:true,pending:!r.confirmed,label:nameOf(id)+' — criticized the place',stake:p.s,mult:leadM(fore),multLabel:'x'+fmt(leadM(fore))+' lead ('+fore+' ep foresight)',owners,tag:tagged?1+RULES.WHO_TAG:1,tagLabel:tagged?'x'+fmt(1+RULES.WHO_TAG)+' who-tag ('+whoNm(id,r.who)+')':null,note:!r.confirmed?'Awaiting confirmation.':(tagged?null:'tagged wrong partner — base payout only'),placeholder:!r.confirmed}));
        }));
      });
      if(DATING_RESULTS.breakup.coupleId&&DATING_RESULTS.breakup.ep===ep) {
        const wid=DATING_RESULTS.breakup.coupleId, owners=MEMBERS.filter(m=>all[m].some(p=>p.m==='breakup'&&p.c===wid)).length;
        events.push({title:'First breakup: '+nameOf(wid),sub:'Only the earliest break pays. '+(owners?owTxt(owners):'No one called it.'),placeholder:!DATING_RESULTS.breakup.confirmed});
        MEMBERS.forEach(m=>all[m].filter(p=>p.m==='breakup'&&p.c===wid).forEach(p=>{
          const fore=ep-p.w-1;
          entries.push(mk({member:m,phase,ok:true,pending:!DATING_RESULTS.breakup.confirmed,label:'First to break up: '+nameOf(wid),stake:p.s,mult:leadM(fore),multLabel:'x'+fmt(leadM(fore))+' lead ('+fore+' ep foresight)',owners,placeholder:!DATING_RESULTS.breakup.confirmed,note:!DATING_RESULTS.breakup.confirmed?'Awaiting confirmation.':null}));
        }));
      }
    }
    if(phase==='weddings') {
      COUPLES.filter(c=>c.wedding&&((c.settledEp||12)===ep)).forEach(c=>{
        const out=c.wedding;
        events.push({title:nameOf(c.id)+': '+WED_LABEL[out].toLowerCase()+(out==='saysNo'?' — '+whoNm(c.id,c.who):''),sub:c.settledEp===ep&&ep<12?'Settled in Episode '+ep+' — board closes early.':null});
        MEMBERS.forEach(m=>all[m].filter(p=>p.c===c.id).forEach(p=>{
          if(p.o===out) {
            const owners=MEMBERS.filter(mm=>all[mm].some(q=>q.c===c.id&&q.o===out)).length, tagged=out==='saysNo'&&p.who===c.who;
            entries.push(mk({member:m,phase,ok:true,label:nameOf(c.id)+' — '+WED_LABEL[out],stake:p.s,mult:WED_MULT[out][p.r],multLabel:'x'+fmt(WED_MULT[out][p.r])+' '+['early','mid','late'][p.r]+' window',owners,tag:tagged?1+RULES.WHO_TAG:1,tagLabel:tagged?'x'+fmt(1+RULES.WHO_TAG)+' who-tag ('+whoNm(c.id,c.who)+')':null,note:out==='saysNo'&&!tagged&&p.who?'who-tag missed ('+whoNm(c.id,p.who)+') — base payout only':null}));
          } else {
            entries.push(mk({member:m,phase,ok:false,label:nameOf(c.id)+' — called '+WED_LABEL[p.o].toLowerCase(),stake:p.s,note:'Actual: '+WED_LABEL[out].toLowerCase()}));
          }
        }));
      });
    }
    if(phase==='reunion'&&ep===13) {
      if (REUNION_RESULTS.placeholders) {
        events.push({title:'Reunion results awaiting confirmation',placeholder:true});
        const pendingLabel = p => p.m==='still'?nameOf(p.c)+' still together':p.m==='back'?nameOf(p.c)+' back together':p.m==='newCouple'?'New couple: '+p.pair.split('|').join(' & '):p.m==='lifeUpdate'?'Life update: '+p.person+' — '+(LIFE_UPD[p.update]||p.update):p.m==='absent'?'Absent: '+p.person:'Confrontation: '+p.a+' vs '+p.b;
        MEMBERS.forEach(m=>all[m].forEach(p=>entries.push(mk({member:m,phase,ok:false,pending:true,label:pendingLabel(p),stake:p.s,placeholder:true,note:'Awaiting confirmed reunion results.'}))));
        return {events,entries};
      }
      Object.keys(REUNION_RESULTS.still).forEach(id=>{
        const truth=REUNION_RESULTS.still[id], owners=MEMBERS.filter(m=>all[m].some(p=>p.m==='still'&&p.c===id)).length;
        events.push({title:nameOf(id)+': '+(truth?'still together':'no longer together')});
        MEMBERS.forEach(m=>all[m].filter(p=>p.m==='still'&&p.c===id).forEach(p=>{
          entries.push(truth?mk({member:m,phase,ok:true,label:nameOf(id)+' still together',stake:p.s,mult:REU_MULT.still,multLabel:'x1 still-together',owners}):mk({member:m,phase,ok:false,label:nameOf(id)+' still together',stake:p.s,note:'They split.'}));
        }));
      });
      const backIds=Object.keys(REUNION_RESULTS.back).filter(id=>REUNION_RESULTS.back[id]);
      if(!backIds.length) events.push({title:'No exes got back together',placeholder:REUNION_RESULTS.placeholders});
      MEMBERS.forEach(m=>all[m].filter(p=>p.m==='back').forEach(p=>{
        const truth=!!REUNION_RESULTS.back[p.c], owners=MEMBERS.filter(mm=>all[mm].some(q=>q.m==='back'&&q.c===p.c)).length;
        entries.push(truth?mk({member:m,phase,ok:true,label:nameOf(p.c)+' back together',stake:p.s,mult:REU_MULT.back,multLabel:'x2 back-together',owners,placeholder:REUNION_RESULTS.placeholders}):mk({member:m,phase,ok:false,label:nameOf(p.c)+' back together',stake:p.s,note:'Stayed split.',placeholder:REUNION_RESULTS.placeholders}));
      }));
      const nc=REUNION_RESULTS.newCouple;
      events.push({title:nc?'New couple: '+nc.split('|').join(' & '):'No new couple revealed',placeholder:REUNION_RESULTS.placeholders});
      MEMBERS.forEach(m=>all[m].filter(p=>p.m==='newCouple').forEach(p=>{
        const hit=nc&&p.pair===nc, owners=MEMBERS.filter(mm=>all[mm].some(q=>q.m==='newCouple'&&q.pair===p.pair)).length;
        entries.push(hit?mk({member:m,phase,ok:true,label:'New couple: '+p.pair.split('|').join(' & '),stake:p.s,mult:REU_MULT.newCouple,multLabel:'x3 new couple',owners,placeholder:REUNION_RESULTS.placeholders}):mk({member:m,phase,ok:false,label:'New couple: '+p.pair.split('|').join(' & '),stake:p.s,placeholder:REUNION_RESULTS.placeholders}));
      }));
      const lu=REUNION_RESULTS.lifeUpdate;
      if(lu) events.push({title:'Life update: '+lu.person+' — '+(LIFE_UPD[lu.update]||lu.update).toLowerCase(),placeholder:REUNION_RESULTS.placeholders});
      MEMBERS.forEach(m=>all[m].filter(p=>p.m==='lifeUpdate').forEach(p=>{
        const hit=lu&&lu.person===p.person&&lu.update===p.update, owners=MEMBERS.filter(mm=>all[mm].some(q=>q.m==='lifeUpdate'&&q.person===p.person&&q.update===p.update)).length;
        entries.push(hit?mk({member:m,phase,ok:true,label:'Life update: '+p.person+' — '+LIFE_UPD[p.update],stake:p.s,mult:REU_MULT.lifeUpdate,multLabel:'x3 life update',owners,placeholder:REUNION_RESULTS.placeholders}):mk({member:m,phase,ok:false,label:'Life update: '+p.person+' — '+LIFE_UPD[p.update],stake:p.s,placeholder:REUNION_RESULTS.placeholders}));
      }));
      const ab=REUNION_RESULTS.absent;
      events.push({title:ab?'Absent: '+ab:'Everyone showed up',placeholder:REUNION_RESULTS.placeholders});
      MEMBERS.forEach(m=>all[m].filter(p=>p.m==='absent').forEach(p=>{
        const hit=ab===p.person, owners=MEMBERS.filter(mm=>all[mm].some(q=>q.m==='absent'&&q.person===p.person)).length;
        entries.push(hit?mk({member:m,phase,ok:true,label:'Absent: '+p.person,stake:p.s,mult:REU_MULT.absent,multLabel:'x2 absent castmate',owners,placeholder:REUNION_RESULTS.placeholders}):mk({member:m,phase,ok:false,label:'Absent: '+p.person,stake:p.s,placeholder:REUNION_RESULTS.placeholders}));
      }));
      const cf=REUNION_RESULTS.confrontation;
      MEMBERS.forEach(m=>all[m].filter(p=>p.m==='confrontation').forEach(p=>{
        if(cf===null) { entries.push(mk({member:m,phase,ok:false,pending:true,label:'Confrontation: '+p.a+' vs '+p.b,stake:p.s,note:'Awaiting commissioner ruling.'})); }
        else { const hit=cf.includes(p.a)&&cf.includes(p.b), owners=MEMBERS.filter(mm=>all[mm].some(q=>q.m==='confrontation'&&((q.a===p.a&&q.b===p.b)||(q.a===p.b&&q.b===p.a)))).length; entries.push(hit?mk({member:m,phase,ok:true,label:'Confrontation: '+p.a+' vs '+p.b,stake:p.s,mult:REU_MULT.confrontation,multLabel:'x2 confrontation (ruled)',owners}):mk({member:m,phase,ok:false,label:'Confrontation: '+p.a+' vs '+p.b,stake:p.s})); }
      }));
    }
    return {events,entries};
  }

  function resolvePhaseClose(phase, picksBy) {
    const MEMBERS = Object.keys(picksBy), all = picksBy, entries=[];
    if(phase==='pods') MEMBERS.forEach(m=>all[m].filter(p=>!isReal(p.c)).forEach(p=>{ entries.push(mk({member:m,phase,ok:false,label:nameOf(p.c)+' never got engaged',stake:p.s})); }));
    if(phase==='dating') MEMBERS.forEach(m=>all[m].forEach(p=>{
      if(p.m==='breakup'&&DATING_RESULTS.breakup.confirmed&&p.c!==DATING_RESULTS.breakup.coupleId) entries.push(mk({member:m,phase,ok:false,label:'First to break up: '+nameOf(p.c),stake:p.s,note:'Lost the race — '+nameOf(DATING_RESULTS.breakup.coupleId)+' broke first.'}));
      if(p.m==='breakup'&&!DATING_RESULTS.breakup.confirmed&&p.c!==DATING_RESULTS.breakup.coupleId) entries.push(mk({member:m,phase,ok:false,pending:true,label:'First to break up: '+nameOf(p.c),stake:p.s,note:'Awaiting a confirmed result.'}));
      if(p.m==='sex'&&!DATING_RESULTS.sex[p.c]) entries.push(mk({member:m,phase,ok:false,label:nameOf(p.c)+' — slept together',stake:p.s,note:'Never shown on camera.'}));
      if(p.m==='criticize'&&!DATING_RESULTS.criticize[p.c]) entries.push(mk({member:m,phase,ok:false,label:nameOf(p.c)+' — criticized the place',stake:p.s,note:'Never happened on camera.'}));
    }));
    return entries;
  }

  /* Score a full phase for a set of members (used by the scoreboard once everyone completed) */
  function scorePhase(phase, picksBy) {
    const startEp = PH_STARTW[phase], endEp = PH_SPAN[phase].endEp;
    let entries = [];
    for (let ep = startEp; ep <= endEp; ep++) {
      entries = entries.concat(resolveEpisode(phase, ep, picksBy).entries);
    }
    entries = entries.concat(resolvePhaseClose(phase, picksBy));
    const totals = {};
    Object.keys(picksBy).forEach(m=>totals[m]=0);
    entries.forEach(e=>{ if(!e.pending) totals[e.member]+=e.points; });
    return {entries, totals};
  }

  const spentBy = picks => picks.reduce((t,p)=>t+p.s,0);
  return {RULES,MEN,WOMEN,COUPLES,DATING_RESULTS,REUNION_RESULTS,POOL,
          nameOf,membOf,whoNm,fmt,leadM,contraV,owTxt,calcPts,
          resolveEpisode,resolvePhaseClose,scorePhase,spentBy};
}

const {useState,useEffect,useCallback,useRef,useId} = React;

function Panel({title,defaultOpen,children}) {
  const [open,setOpen]=useState(!!defaultOpen);
  const bodyId=useId();
  return <div className="panel"><button className="phead" aria-expanded={open} aria-controls={bodyId} onClick={()=>setOpen(!open)}><span>{title}</span><span aria-hidden="true">{open?'−':'+'}</span></button>{open&&<div className="pbody" id={bodyId}>{children}</div>}</div>;
}
function Budget({phase,spent,RULES}) {
  const {budget}=RULES.phases[phase],left=budget-spent;
  return <div style={{margin:'10px 0 4px'}}><div className="budgetrow"><span>{RULES.phases[phase].label} budget</span><span><span className="n">{left}</span> / {budget} hearts left</span></div><div className="budget-bar"><div className="budget-fill" style={{width:(left/budget*100)+'%'}}/></div></div>;
}
function Receipt({e,eng,meId,memberLabels={}}) {
  const {contraV,owTxt,RULES}=eng, cls=e.pending?'receipt pending':(e.ok?'receipt':'receipt miss');
  const cv=e.owners?contraV(e.owners):null;
  return <div className={cls}><span className="pts">{e.pending?'⏳':(e.ok?'+'+e.points+' pts':'0 pts')}</span><div className="who">{e.member===meId?'You':(memberLabels[e.member]||e.member)} {e.ok?'✓':(e.pending?'·':'✗')} {e.label}{e.placeholder&&<span className="warnchip">placeholder</span>}</div>{e.ok&&!e.pending?<div className="math">{e.stake} ♥ x {e.multLabel} x {String(+cv.toFixed(2))} {owTxt(e.owners)}{e.tagLabel?' x '+e.tagLabel:''} x {RULES.POINTS_PER_HEART} baseline = {e.points} pts</div>:<div className="math">{e.stake} ♥ staked{e.note?' · '+e.note:''}</div>}</div>;
}
function Stepper({phase,RULES}) {
  const idx=PH_ORDER.indexOf(phase);
  return <div className="stepper">{PH_ORDER.map((p,i)=><React.Fragment key={p}>{i>0&&<span className="heartsep">♥</span>}<span className={'step '+(i===idx?'cur':(i<idx?'done':''))}>{RULES.phases[p].label}</span></React.Fragment>)}</div>;
}
function Sel({label,value,onChange,options,placeholder}) {
  const id=useId();
  return <div className="field"><label className="small" htmlFor={id}>{label}</label><select id={id} value={value} onChange={ev=>onChange(ev.target.value)}><option value="">{placeholder||'Choose...'}</option>{options.map(o=>typeof o==='string'?<option key={o} value={o}>{o}</option>:<option key={o.v} value={o.v}>{o.t}</option>)}</select></div>;
}
function StakeSlider({value,onChange,max}) {
  const id=useId();
  return <div className="field" style={{minWidth:170}}><label className="small" htmlFor={id}>Stake (max {max})</label><div className="stakebox"><input id={id} type="range" min={5} max={max} step={5} value={Math.min(value,max)} onChange={ev=>onChange(+ev.target.value)}/><span className="stakeval" aria-live="polite">{Math.min(value,max)}♥</span></div></div>;
}

function PodsBoard({w,picks,add,remove,spent,eng}) {
  const {MEN,WOMEN,COUPLES,RULES,nameOf,membOf,leadM,fmt}=eng;
  const [him,setHim]=useState(''),[her,setHer]=useState(''),[stake,setStake]=useState(30);
  const engaged=COUPLES.filter(c=>c.engagedEp<=w).flatMap(c=>[c.him,c.her]);
  const used=picks.flatMap(p=>membOf(p.c));
  const menA=MEN.filter(n=>!engaged.includes(n)&&!used.includes(n));
  const womA=WOMEN.filter(n=>!engaged.includes(n)&&!used.includes(n));
  const left=RULES.phases.pods.budget-spent, maxS=Math.min(RULES.phases.pods.cap,left);
  const doAdd=()=>{const m=COUPLES.find(c=>c.him===him&&c.her===her);add({c:m?m.id:(him+'|'+her),s:Math.min(stake,maxS),w});setHim('');setHer('');};

function Scoreboard({eng, playersById, memberLabels, meId, myPhase}) {
  const {RULES, scorePhase} = eng;
  const memberIds = Object.keys(playersById);
  const [openPhase, setOpenPhase] = useState(null);

  // Per-phase status
  const phaseStatus = {};
  PH_ORDER.forEach(ph => {
    const completedBy = memberIds.filter(id => playersById[id].completed && playersById[id].completed[ph]);
    phaseStatus[ph] = { completedBy, allDone: completedBy.length === memberIds.length };
  });

  // Totals across fully-completed phases
  const grandTotals = {};
  memberIds.forEach(id=>grandTotals[id]=0);
  const phaseTotals = {};
  PH_ORDER.forEach(ph => {
    if (!phaseStatus[ph].allDone) return;
    const picksBy = {};
    memberIds.forEach(id => picksBy[id] = (playersById[id].picks && playersById[id].picks[ph]) || []);
    const {totals} = scorePhase(ph, picksBy);
    phaseTotals[ph] = totals;
    memberIds.forEach(id => grandTotals[id] += totals[id] || 0);
  });

  const ranked = memberIds.slice().sort((a,b)=>grandTotals[b]-grandTotals[a]);
  const donePhases = PH_ORDER.filter(ph=>phaseStatus[ph].allDone);

  return <React.Fragment>
    <div className="card">
      <h2>Standings</h2>
      {donePhases.length===0 && <p className="lede">No phases fully completed yet. Scores appear once everyone in the pool finishes a phase.</p>}
      {donePhases.length>0 && <div className="lb"><table>
        <thead><tr><th>Player</th>{donePhases.map(p=><th key={p}>{RULES.phases[p].label}</th>)}<th>Total</th></tr></thead>
        <tbody>{ranked.map(id=><tr key={id} className={id===meId?'you':''}>
          <td>{id===meId?'You':memberLabels[id]}</td>
          {donePhases.map(p=><td key={p}>{phaseTotals[p][id]||0}</td>)}
          <td className="tot">{grandTotals[id]}</td>
        </tr>)}</tbody>
      </table></div>}
    </div>

    {PH_ORDER.map(ph => {
      const st = phaseStatus[ph];
      const isCurrent = ph === myPhase;
      const notStarted = st.completedBy.length===0 && !isCurrent && PH_ORDER.indexOf(ph)>PH_ORDER.indexOf(myPhase);
      if (notStarted) return null;
      return <div className="card" key={ph}>
        <h3>{RULES.phases[ph].label}</h3>
        {st.allDone ? <React.Fragment>
          <button className="btn-small" onClick={()=>setOpenPhase(openPhase===ph?null:ph)}>
            {openPhase===ph ? 'Hide pick breakdown' : 'Show pick breakdown'}
          </button>
          {openPhase===ph && (()=>{
            const picksBy={};
            memberIds.forEach(id=>picksBy[id]=(playersById[id].picks&&playersById[id].picks[ph])||[]);
            const {entries}=scorePhase(ph,picksBy);
            return <div style={{marginTop:10}}>
              {memberIds.map(id=><div key={id}>
                <h3 style={{marginTop:12}}>{id===meId?'Your picks':memberLabels[id]}</h3>
                {entries.filter(e=>e.member===id).length===0&&<p className="subtle">No picks this phase.</p>}
                {entries.filter(e=>e.member===id).map((e,i)=><Receipt key={i} e={e} eng={eng} meId={meId} memberLabels={memberLabels}/>)}
              </div>)}
            </div>;
          })()}
        </React.Fragment> : <React.Fragment>
          {memberIds.map(id=><div className="member-status" key={id}>
            <span className={'dot '+(st.completedBy.includes(id)?'done':'waiting')}></span>
            <span>{id===meId?'You':memberLabels[id]}</span>
            <span className="subtle" style={{marginLeft:'auto'}}>{st.completedBy.includes(id)?'Completed':'Still picking...'}</span>
          </div>)}
          <p className="subtle" style={{marginTop:8}}>Picks stay hidden until everyone completes this phase.</p>
        </React.Fragment>}
      </div>;
    })}
  </React.Fragment>;
}

function App() {
  // Auth + profile
  const [authState, setAuthState] = useState('checking');
  const [user, setUser] = useState(null);
  const [profile, setProfile] = useState(null);
  const [usernameInput, setUsernameInput] = useState('');

  // Config
  const [cfg, setCfg] = useState(null);
  const [cfgState, setCfgState] = useState('loading');
  const [err, setErr] = useState('');

  // Lobby
  const [pools, setPools] = useState([]);
  const [invites, setInvites] = useState([]);
  const [lobbyLoading, setLobbyLoading] = useState(false);
  const [creating, setCreating] = useState(false);
  const [newPoolName, setNewPoolName] = useState('');
  const [inviteEmail, setInviteEmail] = useState('');
  const [inviteList, setInviteList] = useState([]);

  // Active pool + game
  const [activePool, setActivePool] = useState(null);
  const [poolPlayers, setPoolPlayers] = useState(null);  // {uid: playerDoc}
  const [poolUsers, setPoolUsers] = useState(null);      // {uid: profile}
  const [poolTab, setPoolTab] = useState('play');        // play | standings
  const [eng, setEng] = useState(null);

  const [phase, setPhase] = useState('pods');
  const [screen, setScreen] = useState('intro');
  const [w, setW] = useState(0);
  const [picks, setPicks] = useState(freshPicks);
  const [completed, setCompleted] = useState({});
  const [reveal, setReveal] = useState(null);
  const [closeInfo, setCloseInfo] = useState(null);
  const [saveState, setSaveState] = useState(null);
  const saveTimer = useRef(null);
  const pendingSave = useRef(null);

  /* ── Auth ── */
  useEffect(() => {
    return window._fb.onAuthStateChanged(async u => {
      setUser(u);
      if (u) {
        const p = await window._fb.getProfile(u.uid);
        setProfile(p);
        setUsernameInput(p?.username || (u.displayName||'').split(' ')[0] || '');
        setAuthState('signedin');
      } else {
        setProfile(null);
        setAuthState('signedout');
      }
    });
  }, []);

  /* ── Config ── */
  useEffect(() => {
    loadConfig().then(c => { setCfg(c); setCfgState(c.MEN.length===0?'nocast':'ready'); })
      .catch(e => { setErr(e.message); setCfgState('error'); });
  }, []);

  /* ── Lobby data ── */
  const loadLobby = useCallback(async () => {
    if (!user) return;
    setLobbyLoading(true);
    try {
      const [ps, is] = await Promise.all([
        window._fb.myPools(user.uid),
        window._fb.myInvites(user.email),
      ]);
      setPools(ps); setInvites(is);
    } catch(e) { console.error(e); setErr('Could not refresh your pools. Please try again.'); }
    finally { setLobbyLoading(false); }
  }, [user]);

  useEffect(() => { if (authState==='signedin' && profile?.username) loadLobby(); }, [authState, profile, loadLobby]);

  /* ── Enter a pool ── */
  const enterPool = async (pool) => {
    try {
      setErr(''); setActivePool(pool); setPoolTab('play');
      const engine = makeEngine(cfg, pool.members.length);
      setEng(engine);
      const [players, users] = await Promise.all([
        window._fb.loadAllPlayers(pool.id,user.uid),
        window._fb.getUsers(pool.members),
      ]);
    setPoolPlayers(players); setPoolUsers(users);
    // Load my state
    const mine = players[user.uid];
    if (mine) {
      setPicks(normalizePicks(mine.picks));
      setPhase(mine.phase || 'pods');
      setScreen(mine.screen || 'intro');
      setW(mine.w != null ? mine.w : 0);
      setCompleted(mine.completed || {});
      // Recompute reveal/closeInfo from state
      if ((mine.screen==='board'||mine.screen==='close') && mine.w > 0) {
        const r = engine.resolveEpisode(mine.phase||'pods', mine.w, {[user.uid]: normalizePicks(mine.picks)[mine.phase||'pods']});
        const pendified = {...r, entries: r.entries.map(e=>e.ok?{...e,pending:true,points:0,note:'Points finalize when the pool completes this phase'}:e)};
        setReveal({ep:mine.w, ...pendified});
        if (mine.screen==='close') {
          const closing = engine.resolvePhaseClose(mine.phase||'pods', {[user.uid]:normalizePicks(mine.picks)[mine.phase||'pods']});
          setCloseInfo({closing});
        }
      } else { setReveal(null); setCloseInfo(null); }
    } else {
      setPicks(freshPicks()); setPhase('pods'); setScreen('intro'); setW(0);
      setCompleted({}); setReveal(null); setCloseInfo(null);
      }
    } catch(e) {
      console.error(e); setErr('Could not open this pool. Please try again.');
      setActivePool(null); setEng(null); setPoolPlayers(null); setPoolUsers(null);
    }
  };

  /* ── Save player state ── */
  const flushSave = useCallback(async () => {
    clearTimeout(saveTimer.current);
    const pending = pendingSave.current;
    if (!pending) return;
    pendingSave.current = null;
    try {
      await window._fb.savePlayer(pending.poolId, pending.uid, pending.data);
      setSaveState('saved');
      setTimeout(()=>setSaveState(null),2000);
    } catch(e) {
      pendingSave.current = pending;
      setSaveState('error');
      throw e;
    }
  }, []);

  const savePlayer = useCallback((state, immediate=false) => {
    if (!user || !activePool) return;
    clearTimeout(saveTimer.current);
    setSaveState('saving');
    pendingSave.current = {poolId:activePool.id,uid:user.uid,data:{username:profile.username,...state}};
    if (immediate) return flushSave();
    saveTimer.current = setTimeout(()=>flushSave().catch(()=>{}),600);
  }, [user, activePool, profile, flushSave]);

  useEffect(() => {
    const flushWhenHidden = () => { if (document.visibilityState==='hidden') flushSave().catch(()=>{}); };
    document.addEventListener('visibilitychange',flushWhenHidden);
    return () => document.removeEventListener('visibilitychange',flushWhenHidden);
  }, [flushSave]);

  const exitPool = async () => {
    await flushSave().catch(()=>{});
    setActivePool(null); setPoolPlayers(null); setPoolUsers(null); setEng(null);
    loadLobby();
  };

  /* ── Handlers ── */
  const handleSignIn  = () => window._fb.signIn().catch(e=>setErr(e.message));
  const handleSignOut = async () => { await flushSave().catch(()=>{}); await window._fb.signOut(); setActivePool(null); };

  const saveUsername = async () => {
    const uname = usernameInput.trim();
    if (!uname) return;
    await window._fb.setProfile(user.uid, {username:uname, createdAt:Date.now()});
    setProfile({username:uname});
  };

  const addInviteEmail = () => {
    const e = inviteEmail.trim().toLowerCase();
    if (!e || !e.includes('@') || inviteList.includes(e) || e===(user.email||'').toLowerCase()) return;
    setInviteList([...inviteList, e]); setInviteEmail('');
  };

  const doCreatePool = async () => {
    const name = newPoolName.trim();
    if (!name) return;
    try {
      setErr('');
      const poolId = await window._fb.createPool(name, user.uid);
      await Promise.all(inviteList.map(em => window._fb.sendInvite(poolId, name, user.uid, profile.username, em)));
      setCreating(false); setNewPoolName(''); setInviteList([]);
      loadLobby();
    } catch(e) { console.error(e); setErr('The pool could not be created. Please try again.'); }
  };

  const doAccept = async (inv) => { try { await window._fb.acceptInvite(inv, user.uid); loadLobby(); } catch(e) { setErr(e.message||'Could not accept the invitation.'); } };
  const doDecline = async (inv) => { try { await window._fb.declineInvite(inv.id); loadLobby(); } catch(e) { setErr('Could not decline the invitation.'); } };

  /* Game actions */
  const meName = profile?.username;

  const addPick = p => {
    setPicks(prev=>{
      const np = {...prev,[phase]:[...prev[phase],p]};
      savePlayer({picks:np, phase, screen, w, completed});
      return np;
    });
  };
  const removePick = i => {
    setPicks(prev=>{
      const np = {...prev,[phase]:prev[phase].filter((_,idx)=>idx!==i)};
      savePlayer({picks:np, phase, screen, w, completed});
      return np;
    });
  };

  const doGate = async () => {
    const ep = w+1;
    const endEp = PH_SPAN[phase].endEp;
    const r = eng.resolveEpisode(phase, ep, {[user.uid]: picks[phase]});
    const pendified = {...r, entries: r.entries.map(e=>e.ok?{...e,pending:true,points:0,note:'Points finalize when the pool completes this phase'}:e)};
    setW(ep); setReveal({ep, ...pendified});
    if (ep >= endEp) {
      const closing = eng.resolvePhaseClose(phase, {[user.uid]: picks[phase]});
      const nc = {...completed, [phase]: true};
      setCompleted(nc); setCloseInfo({closing}); setScreen('close');
      try { await savePlayer({picks, phase, screen:'close', w:ep, completed:nc},true); }
      catch(e) { setErr('Your phase could not be saved. Please try again before continuing.'); return; }
      await window._fb.completePhase(activePool.id,phase,user.uid).catch(e=>console.warn('Phase reveal will use legacy storage until this pool is migrated.', e));
    } else {
      setScreen('board');
      try { await savePlayer({picks, phase, screen:'board', w:ep, completed},true); }
      catch(e) { setErr('Your progress could not be saved. Please try again.'); }
    }
  };

  const openNextPhase = async () => {
    const next = NEXT_PH[phase];
    if (!next) { setScreen('final'); await savePlayer({picks, phase, screen:'final', w, completed},true).catch(()=>setErr('The final screen could not be saved.')); return; }
    setPhase(next); setReveal(null); setCloseInfo(null); setScreen('intro');
    await savePlayer({picks, phase:next, screen:'intro', w, completed},true).catch(()=>setErr('The next phase could not be saved.'));
  };

  const refreshPool = async () => {
    if (!activePool) return;
    try {
      const pool = await window._fb.getPool(activePool.id);
      if (!pool) throw new Error('Pool not found');
      const [players,users] = await Promise.all([window._fb.loadAllPlayers(pool.id,user.uid),window._fb.getUsers(pool.members)]);
      setActivePool(pool); setPoolPlayers(players); setPoolUsers(users); setEng(makeEngine(cfg,pool.members.length));
    } catch(e) { console.error(e); setErr('Could not refresh the standings.'); }
  };

  /* ── RENDER ── */

  if (authState==='checking') return <div className="app"><div className="hdr"><div className="eyebrow">Love Is Blind: UK</div><h1>Prediction Pool</h1></div><div className="loading"><span className="spinner">♥</span>Loading...</div></div>;

  if (authState==='signedout') return <div className="app">
    <div className="hdr"><div className="eyebrow">Love Is Blind: UK</div><h1>Prediction Pool</h1><span className="seasonpill">Season 3</span></div>
    <div className="card login-card">
      <div className="heart-hero">♥</div>
      <h2>Welcome</h2>
      <p className="lede">Sign in with Google to join a prediction pool with your friends.</p>
      <button className="btn-google" onClick={handleSignIn}>
        <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.36-8.16 2.36-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
        Sign in with Google
      </button>
      {err && <p style={{color:'var(--rose)',fontSize:13,marginTop:10}}>{err}</p>}
    </div>
  </div>;

  /* Username setup */
  if (!profile?.username) return <div className="app">
    <div className="hdr"><div className="eyebrow">Love Is Blind: UK</div><h1>Prediction Pool</h1></div>
    <div className="card">
      <h2>Pick a username</h2>
      <p className="lede">This is the name your poolmates will see on scoreboards.</p>
      <div className="row" style={{marginTop:14}}>
        <div className="field"><label className="small">Username</label>
          <input type="text" value={usernameInput} onChange={e=>setUsernameInput(e.target.value)} maxLength={20} placeholder="e.g. Patrick"/>
        </div>
      </div>
      <button className="btn-primary" disabled={!usernameInput.trim()} onClick={saveUsername}>Continue</button>
    </div>
  </div>;

  if (cfgState==='loading') return <div className="app"><div className="hdr"><div className="eyebrow">Love Is Blind: UK</div><h1>Prediction Pool</h1></div><div className="loading"><span className="spinner">♥</span>Loading season data...</div></div>;
  if (cfgState==='error') return <div className="app"><div className="hdr"><div className="eyebrow">Love Is Blind: UK</div><h1>Prediction Pool</h1></div><div className="errcard"><h3>Couldn't load season data</h3><p style={{fontSize:12}}>{err}</p><button className="btn-primary" onClick={()=>window.location.reload()}>Retry</button></div></div>;
  if (cfgState==='nocast') return <div className="app"><div className="hdr"><div className="eyebrow">Love Is Blind: UK</div><h1>Prediction Pool</h1><span className="seasonpill">Season 3 · Awaiting cast</span></div><div className="card"><h2>Season not ready yet</h2><p className="lede">The cast hasn't been announced. Check back when the season is closer!</p></div></div>;

  const userBar = <div className="user-bar">
    {user.photoURL && <img className="user-avatar" src={user.photoURL} alt=""/>}
    <span className="user-name">{profile.username}</span>
    <button className="btn-signout" onClick={handleSignOut}>Sign out</button>
  </div>;

  /* ── LOBBY ── */
  if (!activePool) return <div className="app">
    <div className="hdr">
      <div className="eyebrow">Love Is Blind: UK</div>
      <h1>Prediction Pool</h1>
      <span className="seasonpill">Season 3</span>
      {userBar}
    </div>

    {err && <div className="errcard" role="alert"><h3>Something went wrong</h3><p>{err}</p></div>}

    {invites.length>0 && <div className="card">
      <h2>Invites</h2>
      {invites.map(inv=><div className="invite-row" key={inv.id}>
        <div className="iname">{inv.poolName}</div>
        <div className="imeta">Invited by {inv.fromUsername}</div>
        <div className="invite-actions">
          <button className="btn-small filled" onClick={()=>doAccept(inv)}>Accept</button>
          <button className="btn-small" onClick={()=>doDecline(inv)}>Decline</button>
        </div>
      </div>)}
    </div>}

    <div className="card">
      <h2>Your pools</h2>
      {lobbyLoading && <p className="subtle">Loading...</p>}
      {!lobbyLoading && pools.length===0 && <p className="lede">You're not in any pools yet. Create one and invite your friends!</p>}
      {pools.map(p=><div className="pool-row" key={p.id} onClick={()=>enterPool(p)}>
        <div><div className="pname">{p.name}</div><div className="pmeta">{p.members.length} member{p.members.length!==1?'s':''}</div></div>
        <span style={{color:'var(--rose)',fontWeight:700}}>→</span>
      </div>)}

      {!creating && <button className="btn-primary" onClick={()=>setCreating(true)}>Create a new pool</button>}
      {creating && <div style={{marginTop:14}}>
        <hr className="divider"/>
        <h3>New pool</h3>
        <div className="row">
          <div className="field"><label className="small">Pool name</label>
            <input type="text" value={newPoolName} onChange={e=>setNewPoolName(e.target.value)} maxLength={40} placeholder="e.g. MacQuarrie Family Pool"/>
          </div>
        </div>
        <div className="row">
          <div className="field"><label className="small">Invite by email</label>
            <input type="email" value={inviteEmail} onChange={e=>setInviteEmail(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addInviteEmail()} placeholder="friend@email.com"/>
          </div>
          <button className="btn-add" onClick={addInviteEmail}>Add</button>
        </div>
        {inviteList.length>0 && <div style={{margin:'8px 0'}}>
          {inviteList.map(em=><span className="email-chip" key={em}>{em}<button onClick={()=>setInviteList(inviteList.filter(x=>x!==em))}>✕</button></span>)}
        </div>}
        <button className="btn-primary" disabled={!newPoolName.trim()} onClick={doCreatePool}>Create pool{inviteList.length>0?` & send ${inviteList.length} invite${inviteList.length>1?'s':''}`:''}</button>
        <button className="btn-secondary" onClick={()=>{setCreating(false);setNewPoolName('');setInviteList([]);}}>Cancel</button>
      </div>}
    </div>
  </div>;

  /* ── IN POOL ── */
  const {RULES} = eng;
  const spent = eng.spentBy(picks[phase]);
  const endEp = PH_SPAN[phase].endEp;

  // Keep stable UIDs as identity; usernames are display labels only.
  const playersById = {};
  const memberLabels = {};
  if (poolPlayers && poolUsers) {
    activePool.members.forEach(uid => {
      const uname = poolUsers[uid]?.username || (poolPlayers[uid]?.username) || 'Player';
      memberLabels[uid] = uname;
      playersById[uid] = poolPlayers[uid] ? {...poolPlayers[uid],picks:normalizePicks(poolPlayers[uid].picks)} : {picks:freshPicks(), completed:{}};
    });
    // Ensure my latest local state is reflected
    if (user?.uid) playersById[user.uid] = {picks, completed, username:meName};
  }

  const saveBadge = saveState && <span className={`savebadge ${saveState}`}>{saveState==='saving'?'saving...':saveState==='saved'?'✓ saved':'! not saved'}</span>;

  const RevealSummary = () => reveal && <div className="card">
    <h2 style={{marginBottom:10}}>{phase==='reunion'?'The Reunion':'Episode '+reveal.ep}</h2>
    {reveal.events.length===0&&<div className="evt"><h3>Nothing resolved this episode</h3><div className="sub">The board carries forward.</div></div>}
    {reveal.events.map((ev,i)=><div className="evt" key={i}><h3>{ev.title}{ev.placeholder&&<span className="warnchip">placeholder</span>}</h3>{ev.sub&&<div className="sub">{ev.sub}</div>}</div>)}
    {reveal.entries.map((e,i)=><Receipt key={i} e={e} eng={eng} meId={user.uid} memberLabels={memberLabels}/>)}
  </div>;

  return <div className="app">
    <div className="hdr">
      <div className="eyebrow">Love Is Blind: UK</div>
      <h1>{activePool.name} {saveBadge}</h1>
      <span className="seasonpill">Season 3</span>
      <div className="user-bar">
        <button className="backlink" onClick={exitPool}>← All pools</button>
        {user.photoURL && <img className="user-avatar" src={user.photoURL} alt=""/>}
        <span className="user-name">{meName}</span>
        <button className="btn-signout" onClick={handleSignOut}>Sign out</button>
      </div>
    </div>

    {err && <div className="errcard" role="alert"><h3>Something went wrong</h3><p>{err}</p></div>}

    <div className="tabbar">
      <button className={poolTab==='play'?'active':''} onClick={()=>setPoolTab('play')}>Play</button>
      <button className={poolTab==='standings'?'active':''} onClick={()=>{setPoolTab('standings');refreshPool();}}>Standings</button>
    </div>

    {poolTab==='standings' && poolPlayers && <Scoreboard eng={eng} playersById={playersById} memberLabels={memberLabels} meId={user.uid} myPhase={phase}/>}

    {poolTab==='play' && <React.Fragment>
      <Stepper phase={phase} RULES={RULES}/>

      {screen==='intro'&&<div className="card"><h2>{RULES.phases[phase].label}</h2><p className="lede">{PH_INTRO[phase].tagline}</p><Panel title="Rules" defaultOpen>{PH_INTRO[phase].rules}</Panel><Panel title="Scoring">{PH_INTRO[phase].scoring}</Panel><button className="btn-primary" onClick={()=>phase==='pods'?doGate():setScreen('board')}>{phase==='pods'?'I watched Episode 1':'Open the board'}</button></div>}

      {screen==='board'&&<React.Fragment>
        <RevealSummary/>
        {phase==='pods'&&<PodsBoard w={w} picks={picks.pods} add={addPick} remove={removePick} spent={spent} eng={eng}/>}
        {phase==='dating'&&<DatingBoard w={w} picks={picks.dating} add={addPick} remove={removePick} spent={spent} eng={eng}/>}
        {phase==='weddings'&&<WeddingsBoard w={w} picks={picks.weddings} add={addPick} remove={removePick} spent={spent} eng={eng}/>}
        {phase==='reunion'&&<ReunionBoard picks={picks.reunion} add={addPick} remove={removePick} spent={spent} eng={eng}/>}
        <button className="btn-primary" onClick={doGate}>{phase==='reunion'?'I watched the Reunion':'I watched Episode '+(w+1)} →</button>
        <p className="subtle" style={{textAlign:'center'}}>Watching the next episode locks this window's picks.</p>
      </React.Fragment>}

      {screen==='close'&&closeInfo&&<React.Fragment>
        <RevealSummary/>
        <div className="card">
          <h2>{RULES.phases[phase].label} complete</h2>
          {closeInfo.closing.length>0&&<h3 style={{marginTop:10}}>Settled at close</h3>}
          {closeInfo.closing.map((e,i)=><Receipt key={i} e={e} eng={eng} meId={user.uid} memberLabels={memberLabels}/>)}
          <div className="notice">Your picks are locked. Scores and everyone's picks are revealed on the Standings tab once the whole pool completes this phase.</div>
          <button className="btn-primary" onClick={openNextPhase}>{NEXT_PH[phase]?'Continue to '+RULES.phases[NEXT_PH[phase]].label+' →':'Finish the season →'}</button>
        </div>
      </React.Fragment>}

      {screen==='final'&&<div className="card gatecard">
        <div className="crown">👑</div>
        <div className="winner">Season complete!</div>
        <p className="lede" style={{marginBottom:12}}>Check the Standings tab to see how everyone did once the whole pool has finished.</p>
        <button className="btn-primary" onClick={()=>{setPoolTab('standings');refreshPool();}}>View Standings</button>
      </div>}
    </React.Fragment>}
  </div>;
}

const mountApp = () => ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
if (window._fb) mountApp();
else window.addEventListener('firebase-ready',mountApp,{once:true});
</script>

</body>
</html>
