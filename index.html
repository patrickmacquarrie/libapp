<script type="text/babel" data-presets="react">

const SHEET_ID = '10lXVUtRSNpd4yBCIxHHZiM65abQMCu9LXYoJ22r7ifY';

/* ================================================================== */
/*  SHEET FETCHER                                                      */
/* ================================================================== */

const csvUrl = (t) => `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(t)}`;

async function fetchTab(t) {
  const res = await fetch(csvUrl(t));
  if (!res.ok) throw new Error(`Failed to fetch tab "${t}" (${res.status})`);
  return parseCSV(await res.text());
}

function parseCSV(text) {
  const rows = [];
  for (const line of text.split('\n')) {
    if (!line.trim()) continue;
    const row = []; let field = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') { if (inQ && line[i+1] === '"') { field += '"'; i++; } else inQ = !inQ; }
      else if (ch === ',' && !inQ) { row.push(field.trim()); field = ''; }
      else field += ch;
    }
    row.push(field.trim()); rows.push(row);
  }
  return rows;
}

function toObjects(rows) {
  if (rows.length < 2) return [];
  const headers = rows[0].map(h => h.toLowerCase().replace(/[^a-z0-9]/g, '_').replace(/_+/g, '_'));
  return rows.slice(1).filter(r => r.some(c => c !== '')).map(r =>
    Object.fromEntries(headers.map((h, i) => [h, r[i] || ''])));
}

const pBool = v => String(v).toUpperCase() === 'TRUE';

async function loadConfig() {
  const [castR, couplesR, datingR, reunionR, oppsR, settR] = await Promise.all([
    fetchTab('Cast'), fetchTab('Couples'), fetchTab('Dating Results'),
    fetchTab('Reunion Results'), fetchTab('Opponents'), fetchTab('Settings'),
  ]);

  const S = Object.fromEntries(toObjects(settR).map(r => [r.key, r.value]));
  const RULES = {
    POINTS_PER_HEART: parseFloat(S.POINTS_PER_HEART)||2, K: parseFloat(S.K)||1,
    LEAD_STEP: parseFloat(S.LEAD_STEP)||0.5, WHO_TAG: parseFloat(S.WHO_TAG)||0.25,
    POOL: parseInt(S.POOL)||3,
    phases: {
      pods:     {budget:parseInt(S.PODS_BUDGET)||200,     cap:parseInt(S.PODS_CAP)||60,     label:'Pods'},
      dating:   {budget:parseInt(S.DATING_BUDGET)||100,   cap:parseInt(S.DATING_CAP)||40,   label:'Dating'},
      weddings: {budget:parseInt(S.WEDDINGS_BUDGET)||200, cap:parseInt(S.WEDDINGS_CAP)||80, label:'Weddings'},
      reunion:  {budget:parseInt(S.REUNION_BUDGET)||100,  cap:parseInt(S.REUNION_CAP)||40,  label:'Reunion'},
    },
  };
  const P1 = S.PLAYER1_NAME||'Dani', P2 = S.PLAYER2_NAME||'Reese';

  const castO = toObjects(castR);
  const MEN   = castO.filter(r=>r.gender?.toUpperCase()==='M').map(r=>r.name).filter(Boolean);
  const WOMEN = castO.filter(r=>r.gender?.toUpperCase()==='F').map(r=>r.name).filter(Boolean);

  const COUPLES = toObjects(couplesR).filter(r=>r.id&&r.him&&r.her).map(r=>({
    id:r.id, him:r.him, her:r.her, engagedEp:parseInt(r.engaged_ep)||1,
    wedding:r.wedding||undefined, who:r.who_says_no||undefined,
    breakupEp:r.breakup_ep?parseInt(r.breakup_ep):undefined,
    settledEp:r.settled_ep?parseInt(r.settled_ep):undefined,
    still:r.still_together?pBool(r.still_together):undefined,
  }));

  const DATING_RESULTS = {sex:{},criticize:{},breakup:{coupleId:null,ep:null,confirmed:false}};
  toObjects(datingR).forEach(r=>{
    const mkt=r.market?.toLowerCase(), id=r.couple_id, ep=parseInt(r.episode), conf=pBool(r.confirmed);
    if(!mkt||!id||!ep) return;
    if(mkt==='breakup') DATING_RESULTS.breakup={coupleId:id,ep,confirmed:conf};
    else if(mkt==='sex') DATING_RESULTS.sex[id]={ep,confirmed:conf};
    else if(mkt==='criticize') DATING_RESULTS.criticize[id]={ep,who:r.who_criticize_only||undefined,confirmed:conf};
  });

  const RR = {still:{},back:{},newCouple:null,lifeUpdate:null,absent:null,confrontation:null,placeholders:true};
  let hasRR = false;
  toObjects(reunionR).forEach(r=>{
    const mkt=r.market?.toLowerCase(), id=r.couple_person_id_or_name, val=r.value;
    if(!mkt) return; hasRR=true;
    if(mkt==='still') RR.still[id]=pBool(val);
    else if(mkt==='back') RR.back[id]=true;
    else if(mkt==='newcouple') RR.newCouple=id;
    else if(mkt==='lifeupdate') RR.lifeUpdate={person:id,update:val};
    else if(mkt==='absent') RR.absent=id;
    else if(mkt==='confrontation') { RR.confrontation=[id,val].filter(Boolean); if(RR.confrontation.length<2) RR.confrontation=null; }
  });
  if(hasRR) RR.placeholders=false;

  const OPP = {[P1]:{pods:[],dating:[],weddings:[],reunion:[]},[P2]:{pods:[],dating:[],weddings:[],reunion:[]}};
  toObjects(oppsR).forEach(r=>{
    const player=r.player, phase=r.phase?.toLowerCase(), stake=parseInt(r.stake);
    if(!OPP[player]||!phase||!stake) return;
    const cid=r.couple_id___pair, mkt=r.market?.toLowerCase()||'', win=parseInt(r.window___rung);
    if(phase==='pods') OPP[player].pods.push({c:cid,s:stake,w:win||1});
    else if(phase==='dating') { const p={m:mkt,c:cid,s:stake,w:win||6}; if(r.who_tag) p.who=r.who_tag; OPP[player].dating.push(p); }
    else if(phase==='weddings') { const p={c:cid,o:r.outcome,s:stake,r:parseInt(r.window___rung)||0}; if(r.who_tag) p.who=r.who_tag; OPP[player].weddings.push(p); }
    else if(phase==='reunion') {
      const p={m:mkt,s:stake};
      if(mkt==='still'||mkt==='back') p.c=cid;
      else if(mkt==='newcouple') p.pair=cid;
      else if(mkt==='lifeupdate') {p.person=cid;p.update=r.outcome;}
      else if(mkt==='absent') p.person=cid;
      else if(mkt==='confrontation') {p.a=cid;p.b=r.outcome;}
      OPP[player].reunion.push(p);
    }
  });

  return {RULES,MEN,WOMEN,COUPLES,DATING_RESULTS,REUNION_RESULTS:RR,OPPONENTS:OPP,PLAYER1:P1,PLAYER2:P2};
}

/* ================================================================== */
/*  ENGINE                                                             */
/* ================================================================== */

const WED_MULT  = {married:[2.5,2,1.5],saysNo:[3,2.5,2],calledOff:[3,2.5,2]};
const WED_LABEL = {married:'Gets married',saysNo:'Says no at the altar',calledOff:'Called off before the altar'};
const REU_MULT  = {still:1,back:2,newCouple:3,lifeUpdate:3,absent:2,confrontation:2};
const LIFE_UPD  = {engagedNew:'Engaged to someone new',marriedNew:'Married someone new',kid:'Had a kid'};
const PH_ORDER  = ['pods','dating','weddings','reunion'];
const PH_SPAN   = {pods:{endEp:6},dating:{endEp:9},weddings:{endEp:12},reunion:{endEp:13}};
const NEXT_PH   = {pods:'dating',dating:'weddings',weddings:'reunion',reunion:null};

function makeEngine(cfg) {
  const {RULES,MEN,WOMEN,COUPLES,DATING_RESULTS,REUNION_RESULTS,OPPONENTS,PLAYER1,PLAYER2} = cfg;
  const MEMBERS = ['You',PLAYER1,PLAYER2];
  const byId    = Object.fromEntries(COUPLES.map(c=>[c.id,c]));
  const isReal  = k=>!!byId[k];
  const nameOf  = k=>isReal(k)?(byId[k].him+' & '+byId[k].her):k.split('|').join(' & ');
  const membOf  = k=>isReal(k)?[byId[k].him,byId[k].her]:k.split('|');
  const whoNm   = (k,w)=>w==='both'?'both':(w==='him'?membOf(k)[0]:membOf(k)[1]);
  const fmt     = n=>String(+n.toFixed(2));
  const leadM   = f=>1+RULES.LEAD_STEP*Math.max(0,f);
  const contraV = o=>1+RULES.K*(1-o/RULES.POOL);
  const owTxt   = o=>o===1?'solo call':(o===RULES.POOL?'everyone called it':o+' of '+RULES.POOL+' called it');
  const calcPts = (s,m,o,t)=>Math.round(RULES.POINTS_PER_HEART*s*m*contraV(o)*(t||1));

  function mk({member,phase,ok,label,stake,mult,multLabel,owners,tag,tagLabel,note,placeholder,pending}) {
    return {member,phase,ok:!!ok,label,stake,mult,multLabel,owners,tag:tag||1,tagLabel,note,
            placeholder:!!placeholder,pending:!!pending,points:ok?calcPts(stake,mult,owners,tag):0};
  }

  function allP(phase,pp) {
    return {You:pp[phase]||[],[PLAYER1]:OPPONENTS[PLAYER1][phase],[PLAYER2]:OPPONENTS[PLAYER2][phase]};
  }

  function resolveEpisode(phase,ep,pp) {
    const all=allP(phase,pp), events=[], entries=[];
    if(phase==='pods') {
      COUPLES.filter(c=>c.engagedEp===ep).forEach(c=>{
        const owners=MEMBERS.filter(m=>all[m].some(p=>p.c===c.id)).length;
        events.push({title:nameOf(c.id)+' got engaged',sub:ep===1?'Episode 1 — uncallable by design; no one scores it.':(owners===0?'No one called it.':owTxt(owners))});
        MEMBERS.forEach(m=>all[m].filter(p=>p.c===c.id).forEach(p=>{
          const fore=ep-p.w-1;
          entries.push(mk({member:m,phase,ok:true,label:nameOf(c.id)+' engaged',stake:p.s,mult:leadM(fore),multLabel:'x'+fmt(leadM(fore))+' lead ('+fore+' ep foresight)',owners}));
        }));
      });
    }
    if(phase==='dating') {
      Object.entries(DATING_RESULTS.sex).filter(([,r])=>r.ep===ep).forEach(([id,r])=>{
        const owners=MEMBERS.filter(m=>all[m].some(p=>p.m==='sex'&&p.c===id)).length;
        events.push({title:nameOf(id)+' — referenced sleeping together on camera',sub:owners?owTxt(owners):'No one called it.',placeholder:!r.confirmed});
        MEMBERS.forEach(m=>all[m].filter(p=>p.m==='sex'&&p.c===id).forEach(p=>{
          const fore=ep-p.w-1;
          entries.push(mk({member:m,phase,ok:true,label:nameOf(id)+' — slept together',stake:p.s,mult:leadM(fore),multLabel:'x'+fmt(leadM(fore))+' lead ('+fore+' ep foresight)',owners,placeholder:!r.confirmed}));
        }));
      });
      Object.entries(DATING_RESULTS.criticize).filter(([,r])=>r.ep===ep).forEach(([id,r])=>{
        const owners=MEMBERS.filter(m=>all[m].some(p=>p.m==='criticize'&&p.c===id)).length;
        events.push({title:nameOf(id)+' — '+whoNm(id,r.who)+' criticized partner\'s place',sub:owners?owTxt(owners):'No one called it.',placeholder:!r.confirmed});
        MEMBERS.forEach(m=>all[m].filter(p=>p.m==='criticize'&&p.c===id).forEach(p=>{
          const fore=ep-p.w-1, tagged=p.who===r.who;
          entries.push(mk({member:m,phase,ok:true,label:nameOf(id)+' — criticized the place',stake:p.s,mult:leadM(fore),multLabel:'x'+fmt(leadM(fore))+' lead ('+fore+' ep foresight)',owners,tag:tagged?1+RULES.WHO_TAG:1,tagLabel:tagged?'x1.25 who-tag ('+whoNm(id,r.who)+')':null,note:tagged?null:'tagged wrong partner — base payout only',placeholder:!r.confirmed}));
        }));
      });
      if(DATING_RESULTS.breakup.coupleId&&DATING_RESULTS.breakup.ep===ep) {
        const wid=DATING_RESULTS.breakup.coupleId, owners=MEMBERS.filter(m=>all[m].some(p=>p.m==='breakup'&&p.c===wid)).length;
        events.push({title:'First breakup: '+nameOf(wid),sub:'Only the earliest break pays. '+(owners?owTxt(owners):'No one called it.')});
        MEMBERS.forEach(m=>all[m].filter(p=>p.m==='breakup'&&p.c===wid).forEach(p=>{
          const fore=ep-p.w-1;
          entries.push(mk({member:m,phase,ok:true,label:'First to break up: '+nameOf(wid),stake:p.s,mult:leadM(fore),multLabel:'x'+fmt(leadM(fore))+' lead ('+fore+' ep foresight)',owners}));
        }));
      }
    }
    if(phase==='weddings') {
      COUPLES.filter(c=>c.wedding&&!c.breakupEp&&((c.settledEp||12)===ep)).forEach(c=>{
        const out=c.wedding;
        events.push({title:nameOf(c.id)+': '+WED_LABEL[out].toLowerCase()+(out==='saysNo'?' — '+whoNm(c.id,c.who):''),sub:c.settledEp===ep&&ep<12?'Settled in Episode '+ep+' — board closes early.':null});
        MEMBERS.forEach(m=>all[m].filter(p=>p.c===c.id).forEach(p=>{
          if(p.o===out) {
            const owners=MEMBERS.filter(mm=>all[mm].some(q=>q.c===c.id&&q.o===out)).length, tagged=out==='saysNo'&&p.who===c.who;
            entries.push(mk({member:m,phase,ok:true,label:nameOf(c.id)+' — '+WED_LABEL[out],stake:p.s,mult:WED_MULT[out][p.r],multLabel:'x'+fmt(WED_MULT[out][p.r])+' '+['early','mid','late'][p.r]+' window',owners,tag:tagged?1+RULES.WHO_TAG:1,tagLabel:tagged?'x1.25 who-tag ('+whoNm(c.id,c.who)+')':null,note:out==='saysNo'&&!tagged&&p.who?'who-tag missed ('+whoNm(c.id,p.who)+') — base payout only':null}));
          } else {
            entries.push(mk({member:m,phase,ok:false,label:nameOf(c.id)+' — called '+WED_LABEL[p.o].toLowerCase(),stake:p.s,note:'Actual: '+WED_LABEL[out].toLowerCase()}));
          }
        }));
      });
    }
    if(phase==='reunion'&&ep===13) {
      Object.keys(REUNION_RESULTS.still).forEach(id=>{
        const truth=REUNION_RESULTS.still[id], owners=MEMBERS.filter(m=>all[m].some(p=>p.m==='still'&&p.c===id)).length;
        events.push({title:nameOf(id)+': '+(truth?'still together':'no longer together')});
        MEMBERS.forEach(m=>all[m].filter(p=>p.m==='still'&&p.c===id).forEach(p=>{
          entries.push(truth?mk({member:m,phase,ok:true,label:nameOf(id)+' still together',stake:p.s,mult:REU_MULT.still,multLabel:'x1 still-together',owners}):mk({member:m,phase,ok:false,label:nameOf(id)+' still together',stake:p.s,note:'They split.'}));
        }));
      });
      const backIds=Object.keys(REUNION_RESULTS.back).filter(id=>REUNION_RESULTS.back[id]);
      if(!backIds.length) events.push({title:'No exes got back together',placeholder:REUNION_RESULTS.placeholders});
      MEMBERS.forEach(m=>all[m].filter(p=>p.m==='back').forEach(p=>{
        const truth=!!REUNION_RESULTS.back[p.c], owners=MEMBERS.filter(mm=>all[mm].some(q=>q.m==='back'&&q.c===p.c)).length;
        entries.push(truth?mk({member:m,phase,ok:true,label:nameOf(p.c)+' back together',stake:p.s,mult:REU_MULT.back,multLabel:'x2 back-together',owners,placeholder:REUNION_RESULTS.placeholders}):mk({member:m,phase,ok:false,label:nameOf(p.c)+' back together',stake:p.s,note:'Stayed split.',placeholder:REUNION_RESULTS.placeholders}));
      }));
      const nc=REUNION_RESULTS.newCouple;
      events.push({title:nc?'New couple: '+nc.split('|').join(' & '):'No new couple revealed',placeholder:REUNION_RESULTS.placeholders});
      MEMBERS.forEach(m=>all[m].filter(p=>p.m==='newCouple').forEach(p=>{
        const hit=nc&&p.pair===nc, owners=MEMBERS.filter(mm=>all[mm].some(q=>q.m==='newCouple'&&q.pair===p.pair)).length;
        entries.push(hit?mk({member:m,phase,ok:true,label:'New couple: '+p.pair.split('|').join(' & '),stake:p.s,mult:REU_MULT.newCouple,multLabel:'x3 new couple',owners,placeholder:REUNION_RESULTS.placeholders}):mk({member:m,phase,ok:false,label:'New couple: '+p.pair.split('|').join(' & '),stake:p.s,placeholder:REUNION_RESULTS.placeholders}));
      }));
      const lu=REUNION_RESULTS.lifeUpdate;
      if(lu) events.push({title:'Life update: '+lu.person+' — '+(LIFE_UPD[lu.update]||lu.update).toLowerCase(),placeholder:REUNION_RESULTS.placeholders});
      MEMBERS.forEach(m=>all[m].filter(p=>p.m==='lifeUpdate').forEach(p=>{
        const hit=lu&&lu.person===p.person&&lu.update===p.update, owners=MEMBERS.filter(mm=>all[mm].some(q=>q.m==='lifeUpdate'&&q.person===p.person&&q.update===p.update)).length;
        entries.push(hit?mk({member:m,phase,ok:true,label:'Life update: '+p.person+' — '+LIFE_UPD[p.update],stake:p.s,mult:REU_MULT.lifeUpdate,multLabel:'x3 life update',owners,placeholder:REUNION_RESULTS.placeholders}):mk({member:m,phase,ok:false,label:'Life update: '+p.person+' — '+LIFE_UPD[p.update],stake:p.s,placeholder:REUNION_RESULTS.placeholders}));
      }));
      const ab=REUNION_RESULTS.absent;
      events.push({title:ab?'Absent: '+ab:'Everyone showed up',placeholder:REUNION_RESULTS.placeholders});
      MEMBERS.forEach(m=>all[m].filter(p=>p.m==='absent').forEach(p=>{
        const hit=ab===p.person, owners=MEMBERS.filter(mm=>all[mm].some(q=>q.m==='absent'&&q.person===p.person)).length;
        entries.push(hit?mk({member:m,phase,ok:true,label:'Absent: '+p.person,stake:p.s,mult:REU_MULT.absent,multLabel:'x2 absent castmate',owners,placeholder:REUNION_RESULTS.placeholders}):mk({member:m,phase,ok:false,label:'Absent: '+p.person,stake:p.s,placeholder:REUNION_RESULTS.placeholders}));
      }));
      const cf=REUNION_RESULTS.confrontation;
      MEMBERS.forEach(m=>all[m].filter(p=>p.m==='confrontation').forEach(p=>{
        if(cf===null) { entries.push(mk({member:m,phase,ok:false,pending:true,label:'Confrontation: '+p.a+' vs '+p.b,stake:p.s,note:'Awaiting commissioner ruling.'})); }
        else { const hit=cf.includes(p.a)&&cf.includes(p.b), owners=MEMBERS.filter(mm=>all[mm].some(q=>q.m==='confrontation'&&((q.a===p.a&&q.b===p.b)||(q.a===p.b&&q.b===p.a)))).length; entries.push(hit?mk({member:m,phase,ok:true,label:'Confrontation: '+p.a+' vs '+p.b,stake:p.s,mult:REU_MULT.confrontation,multLabel:'x2 confrontation (ruled)',owners}):mk({member:m,phase,ok:false,label:'Confrontation: '+p.a+' vs '+p.b,stake:p.s})); }
      }));
    }
    return {events,entries};
  }

  function resolvePhaseClose(phase,pp) {
    const all=allP(phase,pp), entries=[];
    if(phase==='pods') MEMBERS.forEach(m=>all[m].filter(p=>!isReal(p.c)).forEach(p=>{ entries.push(mk({member:m,phase,ok:false,label:nameOf(p.c)+' never got engaged',stake:p.s})); }));
    if(phase==='dating') MEMBERS.forEach(m=>all[m].forEach(p=>{
      if(p.m==='breakup'&&p.c!==DATING_RESULTS.breakup.coupleId) entries.push(mk({member:m,phase,ok:false,label:'First to break up: '+nameOf(p.c),stake:p.s,note:'Lost the race — '+(DATING_RESULTS.breakup.coupleId?nameOf(DATING_RESULTS.breakup.coupleId)+' broke first.':'no breakup scored.')}));
      if(p.m==='sex'&&!DATING_RESULTS.sex[p.c]) entries.push(mk({member:m,phase,ok:false,label:nameOf(p.c)+' — slept together',stake:p.s,note:'Never shown on camera.',placeholder:true}));
      if(p.m==='criticize'&&!DATING_RESULTS.criticize[p.c]) entries.push(mk({member:m,phase,ok:false,label:nameOf(p.c)+' — criticized the place',stake:p.s,note:'Never happened on camera.',placeholder:true}));
    }));
    return entries;
  }

  const spentBy = picks => picks.reduce((t,p)=>t+p.s,0);
  return {RULES,MEN,WOMEN,COUPLES,DATING_RESULTS,REUNION_RESULTS,OPPONENTS,MEMBERS,PLAYER1,PLAYER2,
          nameOf,membOf,whoNm,fmt,leadM,contraV,owTxt,calcPts,resolveEpisode,resolvePhaseClose,spentBy};
}

const {useState,useEffect,useCallback,useRef} = React;

function Panel({title,defaultOpen,children}) {

function Budget({phase,spent,RULES}) {

function Receipt({e,eng}) {

  return <div className={cls}><span className="pts">{e.pending?'⏳':(e.ok?'+'+e.points+' pts':'0 pts')}</span><div className="who">{e.member==='You'?'You':e.member} {e.ok?'✓':(e.pending?'·':'✗')} {e.label}{e.placeholder&&<span className="warnchip">placeholder</span>}</div>{e.ok?<div className="math">{e.stake} ♥ x {e.multLabel} x {String(+cv.toFixed(2))} {owTxt(e.owners)}{e.tagLabel?' x '+e.tagLabel.replace('x','x'):''} x {RULES.POINTS_PER_HEART} baseline = {e.points} pts</div>:<div className="math">{e.stake} ♥ staked{e.note?' · '+e.note:''}</div>}</div>;
}
function Stepper({phase,RULES}) {
  const idx=PH_ORDER.indexOf(phase);
  return <div className="stepper">{PH_ORDER.map((p,i)=><React.Fragment key={p}>{i>0&&<span className="heartsep">♥</span>}<span className={'step '+(i===idx?'cur':(i<idx?'done':''))}>{RULES.phases[p].label}</span></React.Fragment>)}</div>;
}
function Sel({label,value,onChange,options,placeholder}) {
  return <div className="field"><label className="small">{label}</label><select value={value} onChange={ev=>onChange(ev.target.value)}><option value="">{placeholder||'Choose...'}</option>{options.map(o=>typeof o==='string'?<option key={o} value={o}>{o}</option>:<option key={o.v} value={o.v}>{o.t}</option>)}</select></div>;
}
function StakeSlider({value,onChange,max}) {
  return <div className="field" style={{minWidth:170}}><label className="small">Stake (max {max})</label><div className="stakebox"><input type="range" min={5} max={max} step={5} value={Math.min(value,max)} onChange={ev=>onChange(+ev.target.value)}/><span className="stakeval">{Math.min(value,max)}♥</span></div></div>;
}
function Leaderboard({log,upTo,RULES,MEMBERS}) {
  const phases=PH_ORDER.slice(0,PH_ORDER.indexOf(upTo)+1), totals={};
  MEMBERS.forEach(m=>{totals[m]={};phases.forEach(p=>totals[m][p]=0);});
  log.forEach(e=>{if(!e.pending&&phases.includes(e.phase))totals[e.member][e.phase]+=e.points;});
  const rows=MEMBERS.map(m=>({m,...totals[m],tot:phases.reduce((t,p)=>t+totals[m][p],0)})).sort((a,b)=>b.tot-a.tot);
  return <div className="lb"><table><thead><tr><th>Player</th>{phases.map(p=><th key={p}>{RULES.phases[p].label}</th>)}<th>Total</th></tr></thead><tbody>{rows.map(r=><tr key={r.m} className={r.m==='You'?'you':''}><td>{r.m}</td>{phases.map(p=><td key={p}>{r[p]}</td>)}<td className="tot">{r.tot}</td></tr>)}</tbody></table></div>;
}

function ReunionBoard({picks,add,remove,spent,eng}) {

  const left=RULES.phases.reunion.budget-spent, maxS=Math.min(RULES.phases.reunion.cap,left);
  const AC=[...MEN,...WOMEN];
  const married=COUPLES.filter(c=>c.wedding==='married').map(c=>c.id);
  const split=COUPLES.filter(c=>c.wedding!=='married'||c.still===false).map(c=>c.id);
  const [stC,setStC]=useState(''),[stS,setStS]=useState(20);
  const [bkC,setBkC]=useState(''),[bkS,setBkS]=useState(20);
  const [nH,setNH]=useState(''),[nW,setNW]=useState(''),[nS,setNS]=useState(20);
  const [lP,setLP]=useState(''),[lU,setLU]=useState(''),[lS,setLS]=useState(20);
  const [aP,setAP]=useState(''),[aS,setAS]=useState(20);
  const [cA,setCA]=useState(''),[cB,setCB]=useState(''),[cS2,setCS2]=useState(20);
  const ml=p=>p.m==='still'?nameOf(p.c)+' still together':p.m==='back'?nameOf(p.c)+' back together':p.m==='newCouple'?'New couple: '+p.pair.split('|').join(' & '):p.m==='lifeUpdate'?'Life update: '+p.person+' — '+(LIFE_UPD[p.update]||p.update):p.m==='absent'?'Absent: '+p.person:'Confrontation: '+p.a+' vs '+p.b;
  return <div className="card"><h2>One lock · before the Reunion</h2><Budget phase="reunion" spent={spent} RULES={RULES}/>
    <div className="mkt-title"><h3>Still together</h3><span className="multpill">x1</span></div><div className="row"><Sel label="Married couple" value={stC} onChange={setStC} options={married.filter(id=>!picks.some(p=>p.m==='still'&&p.c===id)).map(id=>({v:id,t:nameOf(id)}))}/><StakeSlider value={stS} onChange={setStS} max={Math.max(5,maxS)}/><button className="btn-add" disabled={!stC||left<5} onClick={()=>{add({m:'still',c:stC,s:Math.min(stS,maxS)});setStC('');}}>Add</button></div>
    <hr className="divider"/><div className="mkt-title"><h3>Back together</h3><span className="multpill">x2</span></div><div className="row"><Sel label="Split couple" value={bkC} onChange={setBkC} options={split.filter(id=>!picks.some(p=>p.m==='back'&&p.c===id)).map(id=>({v:id,t:nameOf(id)}))}/><StakeSlider value={bkS} onChange={setBkS} max={Math.max(5,maxS)}/><button className="btn-add" disabled={!bkC||left<5} onClick={()=>{add({m:'back',c:bkC,s:Math.min(bkS,maxS)});setBkC('');}}>Add</button></div>
    <hr className="divider"/><div className="mkt-title"><h3>New couple revealed</h3><span className="multpill">x3</span></div><div className="row"><Sel label="Him" value={nH} onChange={setNH} options={MEN}/><Sel label="Her" value={nW} onChange={setNW} options={WOMEN}/></div><div className="row"><StakeSlider value={nS} onChange={setNS} max={Math.max(5,maxS)}/><button className="btn-add" disabled={!nH||!nW||left<5} onClick={()=>{add({m:'newCouple',pair:nH+'|'+nW,s:Math.min(nS,maxS)});setNH('');setNW('');}}>Add</button></div>
    <hr className="divider"/><div className="mkt-title"><h3>Major life update</h3><span className="multpill">x3</span></div><div className="row"><Sel label="Castmate" value={lP} onChange={setLP} options={AC}/><Sel label="Update" value={lU} onChange={setLU} options={Object.entries(LIFE_UPD).map(([v,t])=>({v,t}))}/></div><div className="row"><StakeSlider value={lS} onChange={setLS} max={Math.max(5,maxS)}/><button className="btn-add" disabled={!lP||!lU||left<5} onClick={()=>{add({m:'lifeUpdate',person:lP,update:lU,s:Math.min(lS,maxS)});setLP('');setLU('');}}>Add</button></div>
    <hr className="divider"/><div className="mkt-title"><h3>Absent castmate</h3><span className="multpill">x2</span></div><div className="row"><Sel label="Castmate" value={aP} onChange={setAP} options={AC}/><StakeSlider value={aS} onChange={setAS} max={Math.max(5,maxS)}/><button className="btn-add" disabled={!aP||left<5} onClick={()=>{add({m:'absent',person:aP,s:Math.min(aS,maxS)});setAP('');}}>Add</button></div>
    <hr className="divider"/><div className="mkt-title"><h3>Direct confrontation</h3><span className="multpill">x2 · commissioner-ruled</span></div><div className="row"><Sel label="Castmate A" value={cA} onChange={setCA} options={AC.filter(n=>n!==cB)}/><Sel label="Castmate B" value={cB} onChange={setCB} options={AC.filter(n=>n!==cA)}/></div><div className="row"><StakeSlider value={cS2} onChange={setCS2} max={Math.max(5,maxS)}/><button className="btn-add" disabled={!cA||!cB||left<5} onClick={()=>{add({m:'confrontation',a:cA,b:cB,s:Math.min(cS2,maxS)});setCA('');setCB('');}}>Add</button></div>
    {picks.length>0&&<hr className="divider"/>}{picks.map((p,i)=><div className="pickchip" key={i}><div className="nm">{ml(p)} — {p.s}♥</div><button className="btn-x" onClick={()=>remove(i)}>✕</button></div>)}</div>;
}

/* ================================================================== */
/*  APP                                                                */
/* ================================================================== */

const PH_INTRO = {
  pods:{tagline:'Who falls in love through a wall? Predict the engagements before they happen.',rules:<ul><li>Points if a couple you predict gets engaged.</li><li>Earlier calls pay more (+0.5x per episode of foresight).</li><li>Picks open after Episode 1.</li><li>Rarer calls earn a contrarian bonus.</li><li>Max 60 hearts per couple. Unspent hearts gone at phase end.</li></ul>,scoring:<div><p>points = 2 x stake x lead x contrarian</p></div>},
  dating:{tagline:'Out of the pods, into the real world. Three markets on the dead stretch.',rules:<ul><li><b>First to break up</b> — race. Only the earliest-breaking couple pays.</li><li><b>They sleep together</b> — explicitly referenced on camera.</li><li><b>Criticizes their place</b> — negative on-camera comment. Tag who says it for +25%.</li><li>Budget 100, max 40 per pick.</li></ul>,scoring:<div><p>points = 2 x stake x lead x contrarian (+25% who-tag)</p></div>},
  weddings:{tagline:'The heavy gate. One outcome per couple — the earlier you lock it, the more it pays.',rules:<ul><li>One call per couple: gets married, says no (tag who for +25%), or called off.</li><li>Three windows. Multipliers fall closer to the wedding.</li><li>Budget 200, max 80 per couple.</li></ul>,scoring:<div><p>points = 2 x stake x window multiplier x contrarian</p></div>},
  reunion:{tagline:'The victory lap. One lock before the reunion airs.',rules:<ul><li>New couple x3 · Life update x3 · Back together x2 · Absent castmate x2 · Confrontation x2 · Still together x1.</li><li>Budget 100, max 40 per pick.</li></ul>,scoring:<div><p>points = 2 x stake x difficulty x contrarian</p></div>},
};

const EMPTY_PICKS = {pods:[],dating:[],weddings:[],reunion:[]};

function App() {
  // Auth state
  const [authState, setAuthState] = useState('checking'); // checking | signedout | signedin
  const [user,      setUser]      = useState(null);

  // Config/sheet state
  const [ls,   setLs]   = useState('loading');
  const [err,  setErr]  = useState('');
  const [eng,  setEng]  = useState(null);
  const [sync, setSync] = useState(null);

  // Game state
  const [phase,     setPhase]     = useState('pods');
  const [screen,    setScreen]    = useState('intro');
  const [w,         setW]         = useState(0);
  const [picks,     setPicks]     = useState(EMPTY_PICKS);
  const [log,       setLog]       = useState([]);
  const [reveal,    setReveal]    = useState(null);
  const [closeInfo, setCloseInfo] = useState(null);

  // Save badge
  const [saveState, setSaveState] = useState(null); // null | saving | saved | error
  const saveTimer = useRef(null);

  // ── Auth listener ─────────────────────────────────────────────────
  useEffect(() => {
    const unsub = window._fb.onAuthStateChanged(u => {
      setUser(u);
      setAuthState(u ? 'signedin' : 'signedout');
    });
    return unsub;
  }, []);

  // ── Load sheet config ─────────────────────────────────────────────
  const doLoad = useCallback(async () => {
    setLs('loading');
    try {
      const cfg = await loadConfig();
      setEng(makeEngine(cfg));
      setSync(new Date());
      setLs(cfg.MEN.length === 0 ? 'nocast' : 'ready');
    } catch(e) { setErr(e.message); setLs('error'); }
  }, []);

  useEffect(() => { doLoad(); }, [doLoad]);

  // ── Load saved picks from Firestore when user signs in ────────────
  useEffect(() => {
    if (!user) return;
    window._fb.loadPicks(user.uid).then(saved => {
      if (!saved) return;
      if (saved.picks)     setPicks(saved.picks);
      if (saved.log)       setLog(saved.log);
      if (saved.phase)     setPhase(saved.phase);
      if (saved.screen)    setScreen(saved.screen);
      if (saved.w != null) setW(saved.w);
      if (saved.reveal)    setReveal(saved.reveal);
      if (saved.closeInfo) setCloseInfo(saved.closeInfo);
    }).catch(() => {});
  }, [user]);

  // ── Auto-save picks to Firestore ──────────────────────────────────
  const saveToFirestore = useCallback((state) => {
    if (!user) return;
    clearTimeout(saveTimer.current);
    setSaveState('saving');
    saveTimer.current = setTimeout(() => {
      window._fb.savePicks(user.uid, state)
        .then(() => { setSaveState('saved'); setTimeout(() => setSaveState(null), 2000); })
        .catch(() => setSaveState('error'));
    }, 800);
  }, [user]);

  const updatePicks = (newPicks) => {
    setPicks(newPicks);
    saveToFirestore({picks:newPicks, log, phase, screen, w, reveal, closeInfo});
  };
  const updateLog = (newLog) => {
    setLog(newLog);
    saveToFirestore({picks, log:newLog, phase, screen, w, reveal, closeInfo});
  };

  // ── Sign in / out ─────────────────────────────────────────────────
  const handleSignIn  = () => window._fb.signIn().catch(e => setErr(e.message));
  const handleSignOut = () => {
    window._fb.signOut();
    setPicks(EMPTY_PICKS); setLog([]); setPhase('pods');
    setScreen('intro'); setW(0); setReveal(null); setCloseInfo(null);
  };

  const sheetUrl = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/edit`;

  // ── Auth check screen ─────────────────────────────────────────────
  if (authState === 'checking') return (
    <div className="app">
      <div className="hdr"><div className="eyebrow">Love Is Blind: UK</div><h1>Prediction Pool</h1></div>
      <div className="loading"><span className="spinner">♥</span>Signing you in...</div>
    </div>
  );

  if (authState === 'signedout') return (
    <div className="app">
      <div className="hdr">
        <div className="eyebrow">Love Is Blind: UK</div>
        <h1>Prediction Pool</h1>
        <span className="seasonpill">Season 3</span>
      </div>
      <div className="card login-card">
        <div className="heart-hero">♥</div>
        <h2>Welcome</h2>
        <p className="lede">Sign in with your Google account to make predictions and save your picks across sessions.</p>
        <button className="btn-google" onClick={handleSignIn}>
          <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.36-8.16 2.36-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/><path fill="none" d="M0 0h48v48H0z"/></svg>
          Sign in with Google
        </button>
        {err && <p style={{color:'var(--rose)',fontSize:13,marginTop:10}}>{err}</p>}
      </div>
    </div>
  );

  // ── Sheet loading states ──────────────────────────────────────────
  if (ls === 'loading') return (
    <div className="app">
      <div className="hdr"><div className="eyebrow">Love Is Blind: UK</div><h1>Prediction Pool</h1></div>
      <div className="loading"><span className="spinner">♥</span>Loading from Google Sheets...</div>
    </div>
  );

  if (ls === 'error') return (
    <div className="app">
      <div className="hdr"><div className="eyebrow">Love Is Blind: UK</div><h1>Prediction Pool</h1></div>
      <div className="errcard"><h3>Couldn't read the sheet</h3><p>Make sure the sheet is shared as <b>"Anyone with the link can view"</b>, then refresh.</p><p style={{fontSize:12,color:'#9a6a76'}}>{err}</p><button className="btn-primary" onClick={doLoad}>Try again</button></div>
    </div>
  );

  if (ls === 'nocast') return (
    <div className="app">
      <div className="hdr"><div className="eyebrow">Love Is Blind: UK</div><h1>Prediction Pool</h1><span className="seasonpill">Season 3 · Awaiting cast</span></div>
      <div className="card"><h2>Cast not yet entered</h2><p className="lede">Add names to the Cast tab in the sheet and refresh.</p><div className="setup-notice"><strong>Next step</strong><a href={sheetUrl} target="_blank" rel="noopener noreferrer">Open the Google Sheet</a> and fill in the Cast tab.</div><button className="btn-primary" onClick={doLoad}>Reload from sheet</button></div>
    </div>
  );

  // ── Game ──────────────────────────────────────────────────────────
  const {RULES,MEMBERS,PLAYER1,PLAYER2,resolveEpisode,resolvePhaseClose,spentBy} = eng;
  const endEp = PH_SPAN[phase].endEp;
  const spent = spentBy(picks[phase]);

  const addPick = p => {
    const np = {...picks,[phase]:[...picks[phase],p]};
    updatePicks(np);
  };
  const removePick = i => {
    const np = {...picks,[phase]:picks[phase].filter((_,idx)=>idx!==i)};
    updatePicks(np);
  };

  const doGate = () => {
    const ep = w+1, r = resolveEpisode(phase,ep,picks);
    const newLog = [...log, ...r.entries];
    const newW = ep;
    if (ep >= endEp) {
      const closing = resolvePhaseClose(phase,picks);
      const finalLog = [...newLog, ...closing];
      const unspent = MEMBERS.map(m=>{const pk=m==='You'?picks[phase]:eng.OPPONENTS[m][phase];return{m,left:RULES.phases[phase].budget-spentBy(pk)};}).filter(u=>u.left>0);
      const ci = {closing,unspent};
      setLog(finalLog); setW(newW); setReveal({ep,...r}); setCloseInfo(ci); setScreen('close');
      saveToFirestore({picks,log:finalLog,phase,screen:'close',w:newW,reveal:{ep,...r},closeInfo:ci});
    } else {
      setLog(newLog); setW(newW); setReveal({ep,...r}); setScreen('board');
      saveToFirestore({picks,log:newLog,phase,screen:'board',w:newW,reveal:{ep,...r},closeInfo});
    }
  };

  const openNextPhase = () => {
    const next = NEXT_PH[phase];
    if (!next) { setScreen('final'); saveToFirestore({picks,log,phase,screen:'final',w,reveal,closeInfo}); return; }
    setPhase(next); setReveal(null); setScreen('intro');
    saveToFirestore({picks,log,phase:next,screen:'intro',w,reveal:null,closeInfo:null});
  };

  const winnerName = () => {
    const t={};MEMBERS.forEach(m=>t[m]=0);log.forEach(e=>{if(!e.pending)t[e.member]+=e.points;});
    return MEMBERS.slice().sort((a,b)=>t[b]-t[a])[0];
  };

  const saveBadge = saveState && (
    <span className={`savebadge ${saveState}`}>
      {saveState==='saving'?'saving...':saveState==='saved'?'✓ saved':'! not saved'}
    </span>
  );

  const syncBadge = <button className="syncbadge" onClick={doLoad}>↻ {sync?sync.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}):'sync'}</button>;

  const RevealSummary = () => reveal && (
    <div className="card">
      <h2 style={{marginBottom:10}}>{phase==='reunion'?'The Reunion':'Episode '+reveal.ep}</h2>
      {reveal.events.length===0&&<div className="evt"><h3>Nothing resolved this episode</h3><div className="sub">The board carries forward.</div></div>}
      {reveal.events.map((ev,i)=><div className="evt" key={i}><h3>{ev.title}{ev.placeholder&&<span className="warnchip">placeholder</span>}</h3>{ev.sub&&<div className="sub">{ev.sub}</div>}</div>)}
      {reveal.entries.slice().sort((a,b)=>(a.member==='You'?-1:1)-(b.member==='You'?-1:1)).map((e,i)=><Receipt key={i} e={e} eng={eng}/>)}
    </div>
  );

  return <div className="app">
    <div className="hdr">
      <div className="eyebrow">Love Is Blind: UK</div>
      <h1>Prediction Pool {syncBadge}{saveBadge}</h1>
      <span className="seasonpill">Season 3 · You vs {PLAYER1} &amp; {PLAYER2}</span>
      <div className="user-bar">
        {user.photoURL && <img className="user-avatar" src={user.photoURL} alt=""/>}
        <span className="user-name">{user.displayName || user.email}</span>
        <button className="btn-signout" onClick={handleSignOut}>Sign out</button>
        <a href={sheetUrl} target="_blank" rel="noopener noreferrer" style={{fontSize:12,color:'var(--rose)',fontWeight:600}}>Edit sheet ↗</a>
      </div>
    </div>
    <Stepper phase={phase} RULES={RULES}/>

    {screen==='intro'&&<div className="card"><h2>{RULES.phases[phase].label}</h2><p className="lede">{PH_INTRO[phase].tagline}</p><Panel title="Rules" defaultOpen>{PH_INTRO[phase].rules}</Panel><Panel title="Scoring">{PH_INTRO[phase].scoring}</Panel><button className="btn-primary" onClick={()=>phase==='pods'?doGate():setScreen('board')}>{phase==='pods'?'I watched Episode 1':'Open the board'}</button></div>}

    {screen==='board'&&<React.Fragment>
      <RevealSummary/>
      {phase==='pods'&&<PodsBoard w={w} picks={picks.pods} add={addPick} remove={removePick} spent={spent} eng={eng}/>}
      {phase==='dating'&&<DatingBoard w={w} picks={picks.dating} add={addPick} remove={removePick} spent={spent} eng={eng}/>}
      {phase==='weddings'&&<WeddingsBoard w={w} picks={picks.weddings} add={addPick} remove={removePick} spent={spent} eng={eng}/>}
      {phase==='reunion'&&<ReunionBoard picks={picks.reunion} add={addPick} remove={removePick} spent={spent} eng={eng}/>}
      <button className="btn-primary" onClick={doGate}>{phase==='reunion'?'I watched the Reunion':'I watched Episode '+(w+1)} →</button>
      <p className="subtle" style={{textAlign:'center'}}>Watching the next episode locks this window's picks.</p>
    </React.Fragment>}

    {screen==='close'&&closeInfo&&<React.Fragment>
      <RevealSummary/>
      <div className="card">
        <h2>{RULES.phases[phase].label} closed</h2>
        {closeInfo.closing.length>0&&<h3 style={{marginTop:10}}>Settled at close</h3>}
        {closeInfo.closing.map((e,i)=><Receipt key={i} e={e} eng={eng}/>)}
        {closeInfo.unspent.length>0&&<div className="notice">{closeInfo.unspent.map(u=><div key={u.m}><b>{u.m}</b> left {u.left} hearts unspent — gone.</div>)}</div>}
        <h3 style={{marginTop:14}}>Standings</h3>
        <Leaderboard log={log} upTo={phase} RULES={RULES} MEMBERS={MEMBERS}/>
        <button className="btn-primary" onClick={openNextPhase}>{NEXT_PH[phase]?'Commissioner: open '+RULES.phases[NEXT_PH[phase]].label+' →':'See the season result →'}</button>
      </div>
    </React.Fragment>}

    {screen==='final'&&<div className="card gatecard">
      <div className="crown">👑</div>
      <div className="winner">{winnerName()} takes the season</div>
      <Leaderboard log={log} upTo="reunion" RULES={RULES} MEMBERS={MEMBERS}/>
      {log.some(e=>e.pending)&&<div className="notice" style={{textAlign:'left'}}>Soft bets are awaiting the commissioner's ruling — those stakes recompute when the ruling publishes.</div>}
      <button className="btn-primary" onClick={()=>window.location.reload()}>Run it back</button>
    </div>}
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
